<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b1020">
    <title>Foundation 12 &middot; Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app">
        <section id="setup" class="screen">
            <header class="setup-header">
                <h1>Foundation 12</h1>
                <p class="subtitle">Eric Goodman &middot; Original 12-minute sequence</p>
            </header>

            <ol id="preview-list" class="preview-list" aria-label="Sequence overview"></ol>

            <div class="meta-row">
                <span id="total-time" class="meta-pill">~11 min</span>
                <span id="total-steps" class="meta-pill">- steps</span>
            </div>

            <button id="start-btn" class="primary-btn">Start</button>

            <p class="disclaimer">Move within a pain-free range. Brace the lower back on the hinges, and let the breath be long and unhurried.</p>
        </section>

        <section id="workout" class="screen hidden">
            <header class="workout-header">
                <button id="exit-btn" class="icon-btn" aria-label="Exit workout">&times;</button>
                <div class="session-progress">
                    <span id="step-indicator">1 / -</span>
                    <div class="progress-track"><div id="progress-fill"></div></div>
                </div>
            </header>

            <div class="phase-tag" id="phase-tag">Phase</div>

            <div class="timer-wrap">
                <svg class="timer-ring" viewBox="0 0 220 220" aria-hidden="true">
                    <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
                    <circle id="ring-fg" class="ring-fg" cx="110" cy="110" r="100"></circle>
                </svg>
                <div class="timer-text">
                    <div id="time-remaining" class="time-remaining">0</div>
                    <div id="phase-step" class="side-label"></div>
                </div>
            </div>

            <div class="exercise-info">
                <h2 id="exercise-name">Step</h2>
                <p id="exercise-cue" class="cue">Cue</p>
            </div>

            <div class="controls">
                <button id="prev-btn" class="ctrl-btn" aria-label="Previous step">&laquo;</button>
                <button id="play-btn" class="ctrl-btn play" aria-label="Play or pause">
                    <span id="play-icon">&#9658;</span>
                </button>
                <button id="next-btn" class="ctrl-btn" aria-label="Next step">&raquo;</button>
            </div>

            <div class="next-up">
                <span class="next-label">Next</span>
                <span id="next-name">&mdash;</span>
            </div>
        </section>

        <section id="done" class="screen hidden">
            <div class="done-card">
                <h1>Done.</h1>
                <p id="done-summary">Nice work.</p>
                <div class="done-actions">
                    <button id="again-btn" class="primary-btn">Again</button>
                    <button id="home-btn" class="secondary-btn">Back to start</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
