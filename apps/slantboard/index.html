<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0b1020">
    <title>Slant Board Timer</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <script src="../lib/pwa.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app">
        <!-- Setup screen -->
        <section id="setup" class="screen">
            <header class="setup-header">
                <h1>Slant Board</h1>
                <p class="subtitle">Patellar tendon &middot; tarsal tunnel</p>
            </header>

            <div class="routine-picker" role="radiogroup" aria-label="Choose routine length">
                <button class="routine-card" data-routine="quick" role="radio" aria-checked="false">
                    <span class="routine-time">5 min</span>
                    <span class="routine-name">Quick</span>
                    <span class="routine-desc">5 essentials</span>
                </button>
                <button class="routine-card selected" data-routine="standard" role="radio" aria-checked="true">
                    <span class="routine-time">10 min</span>
                    <span class="routine-name">Standard</span>
                    <span class="routine-desc">Morning reset</span>
                </button>
                <button class="routine-card" data-routine="extended" role="radio" aria-checked="false">
                    <span class="routine-time">12 min</span>
                    <span class="routine-name">Extended</span>
                    <span class="routine-desc">+ hamstrings &amp; lunge</span>
                </button>
            </div>

            <ol id="preview-list" class="preview-list" aria-label="Exercises in selected routine"></ol>

            <button id="start-btn" class="primary-btn">Start</button>

            <p class="disclaimer">Move within a pain-free range. Stop anything that sharply hurts the knee or sends nerve symptoms down the foot.</p>
        </section>

        <!-- Workout screen -->
        <section id="workout" class="screen hidden">
            <header class="workout-header">
                <button id="exit-btn" class="icon-btn" aria-label="Exit workout">&times;</button>
                <div class="session-progress">
                    <span id="step-indicator">1 / 10</span>
                    <div class="progress-track"><div id="progress-fill"></div></div>
                </div>
            </header>

            <div class="exercise-info">
                <h2 id="exercise-name">Exercise</h2>
                <p id="exercise-stance" class="stance">Stance</p>
            </div>

            <div class="timer-wrap">
                <svg class="timer-ring" viewBox="0 0 220 220" aria-hidden="true">
                    <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
                    <circle id="ring-fg" class="ring-fg" cx="110" cy="110" r="100"></circle>
                </svg>
                <div class="timer-text">
                    <div id="side-label" class="side-label"></div>
                </div>
            </div>

            <p id="exercise-cue" class="cue">Cue</p>

            <div class="controls">
                <button id="prev-btn" class="ctrl-btn" aria-label="Previous exercise">&laquo;</button>
                <button id="play-btn" class="ctrl-btn play" aria-label="Play or pause">
                    <span id="play-icon">&#9658;</span>
                </button>
                <button id="next-btn" class="ctrl-btn" aria-label="Next exercise">&raquo;</button>
            </div>

            <div class="next-up">
                <span class="next-label">Next</span>
                <span id="next-name">&mdash;</span>
            </div>
        </section>

        <!-- Done screen -->
        <section id="done" class="screen hidden">
            <div class="done-card">
                <h1>Done.</h1>
                <p id="done-summary">Nice work.</p>
                <div class="done-actions">
                    <button id="again-btn" class="primary-btn">Again</button>
                    <button id="home-btn" class="secondary-btn">Change routine</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
