<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dev Command Center</title>
  <meta name="description" content="Prompt well. Context well. Build well." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand-50: #FDFCFB;
      --sand-100: #F8F5F0;
      --sand-200: #F0ECE6;
      --sand-300: #E5E0DA;
      --sand-400: #D4CCC0;
      --sand-500: #C4A97D;
      --sand-600: #8B7355;
      --sand-700: #6B5B3E;
      --ink: #1a1a1a;
      --ink-light: #444;
      --ink-muted: #888;
      --ink-faint: #aaa;
      --bg: #F5F1EB;
      --card: #ffffff;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      --font-serif: 'DM Serif Display', Georgia, 'Times New Roman', serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root { min-height: 100vh; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-up { animation: fadeUp 0.35s ease-out both; }
    .fade-in { animation: fadeIn 0.3s ease-out both; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--sand-400); border-radius: 3px; }

    /* Textarea focus glow */
    textarea:focus {
      border-color: var(--sand-500) !important;
      box-shadow: 0 0 0 3px rgba(196, 169, 125, 0.12);
    }

    /* Button hover states */
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-secondary:hover { background: var(--sand-300) !important; }
    .tool-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* Selection */
    ::selection { background: rgba(196, 169, 125, 0.25); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Data ──────────────────────────────────────────────────
    const TOOLS = {
      claudeCode: {
        name: "Claude Code",
        icon: "\u2328\uFE0F",
        color: "#D97706",
        bestFor: "Executing code changes, refactoring, file operations, running tests",
        tips: [
          "Clone the repo and let it explore \u2014 don't paste snippets, give it the full codebase.",
          "Be directive: 'Refactor this component to use a custom hook' beats 'clean this up'.",
          "Chain commands: 'Run the tests, fix what fails, then run again.'",
          "Use it for mechanical work \u2014 renaming, restructuring, migrations.",
          "When it goes off track, interrupt early. Don't let it dig a deeper hole.",
        ],
        promptTemplates: [
          {
            label: "New Feature",
            template: "Look at the codebase structure first. I need to add [FEATURE]. It should follow the patterns already established in [SIMILAR_FILE]. Requirements:\n- [REQUIREMENT_1]\n- [REQUIREMENT_2]\nDon't over-engineer. Match existing conventions.",
          },
          {
            label: "Bug Fix",
            template: "There's a bug: [DESCRIBE]. Expected behavior: [EXPECTED]. Actual behavior: [ACTUAL]. Start by reading [RELEVANT_FILES]. Reproduce mentally, then fix with minimal changes.",
          },
          {
            label: "Refactor",
            template: "Refactor [FILE/COMPONENT] to [GOAL]. Keep the external API/behavior identical. Run existing tests after to confirm nothing broke. If no tests exist, flag that.",
          },
        ],
      },
      chatgpt: {
        name: "ChatGPT 5.4 Pro",
        icon: "\uD83E\uDDE0",
        color: "#10A37F",
        bestFor: "Problem solving, architecture decisions, debugging logic, thinking through trade-offs",
        tips: [
          "Use Thinking mode for architecture questions \u2014 it reasons through trade-offs well.",
          "Paste full error traces with context, not just the error message.",
          "For problem solving: describe the outcome you want, then the constraints, then what you've tried.",
          "It's better at 'should I do X or Y?' than 'do X for me.'",
          "Use RepoPrompt Pro to give it full file context when needed.",
        ],
        promptTemplates: [
          {
            label: "Architecture Decision",
            template: "I'm building [APP]. I need to decide between [OPTION_A] and [OPTION_B] for [COMPONENT]. My constraints: [CONSTRAINTS]. What actually works in production and why? Be direct \u2014 don't hedge.",
          },
          {
            label: "Debug Logic",
            template: "Here's my code: [CODE]. It should [EXPECTED] but instead [ACTUAL]. I've already tried [ATTEMPTS]. Walk me through what's actually happening step by step.",
          },
          {
            label: "Design Review",
            template: "Here's my approach for [FEATURE]: [DESCRIPTION]. Poke holes in it. What will break at scale? What am I not thinking about? Be brutally honest.",
          },
        ],
      },
      gemini: {
        name: "Gemini Pro",
        icon: "\u2726",
        color: "#4285F4",
        bestFor: "Large data processing, quick general answers, working with big context windows",
        tips: [
          "Feed it large datasets, long docs, or big codebases \u2014 it handles scale well.",
          "Good for 'summarize this entire repo' or 'find patterns across these 50 files.'",
          "Quick factual lookups are reliable here.",
          "For code gen, it's fast but review carefully \u2014 speed \u2260 correctness.",
          "Use it when you need breadth over depth.",
        ],
        promptTemplates: [
          {
            label: "Large Data Analysis",
            template: "Here's [DATA]. I need to understand [WHAT]. Summarize the key patterns, flag anomalies, and give me the 3 most important takeaways. Be specific with numbers.",
          },
          {
            label: "Codebase Overview",
            template: "Here's my project structure and key files. Give me: 1) Architecture summary, 2) Dependencies map, 3) Potential issues you see, 4) What's well-done. Be concise.",
          },
        ],
      },
      perplexity: {
        name: "Perplexity Pro",
        icon: "\uD83D\uDD0D",
        color: "#6366F1",
        bestFor: "Research, documentation lookup, finding examples, verifying approaches",
        tips: [
          "Use for 'is there a library that does X?' \u2014 it finds real, current options.",
          "Great for checking if an API/approach is deprecated or has known issues.",
          "Ask it to find example implementations of specific patterns.",
          "Use for documentation gaps \u2014 when official docs are unclear.",
          "Trust its sources but verify version compatibility yourself.",
        ],
        promptTemplates: [
          {
            label: "Find Library/Tool",
            template: "I need a [LANGUAGE] library for [USE_CASE]. Requirements: [REQUIREMENTS]. Show me the top 2-3 options with pros/cons and GitHub stars. No abandoned projects.",
          },
          {
            label: "Verify Approach",
            template: "Is [APPROACH] still the recommended way to [TASK] in [FRAMEWORK] as of 2026? Are there known issues or better alternatives? Link to sources.",
          },
        ],
      },
    };

    const OUTLINE_SECTIONS = [
      { id: "what", title: "What", placeholder: "What are you building? One sentence.", hint: "Keep it tight. If you can't say it in one sentence, you don't know yet." },
      { id: "who", title: "Who", placeholder: "Who is this for? Be specific.", hint: "A real person or persona. 'Everyone' means no one." },
      { id: "why", title: "Why", placeholder: "What problem does this solve? What's the pain?", hint: "No pain, no product. Be honest about the need." },
      { id: "scope", title: "Scope", placeholder: "What are the 3-5 core features? No more.", hint: "Proverbs 13:11 \u2014 gather little by little. Cut ruthlessly." },
      { id: "stack", title: "Stack", placeholder: "What technologies? What's already decided?", hint: "List frameworks, hosting, DB, auth \u2014 whatever's locked in." },
      { id: "constraints", title: "Constraints", placeholder: "Time, money, skill gaps, hard requirements?", hint: "Constraints are gifts. They force focus." },
      { id: "firstStep", title: "First Step", placeholder: "What's the very first thing to build?", hint: "The smallest thing that proves the idea works. Ship that first." },
    ];

    const CONFIG_FIELDS = [
      { id: "role", label: "Role / Persona", placeholder: "e.g., Senior React developer with strong opinions on clean architecture" },
      { id: "tone", label: "Tone", placeholder: "e.g., Direct, no fluff. Challenge bad ideas. Explain trade-offs." },
      { id: "stack", label: "Stack & Conventions", placeholder: "e.g., Next.js 15, TypeScript strict, Tailwind, shadcn/ui, Drizzle ORM" },
      { id: "patterns", label: "Patterns to Follow", placeholder: "e.g., Server components by default. Custom hooks for shared logic. Collocate files." },
      { id: "avoid", label: "Never Do This", placeholder: "e.g., No any types. No inline styles. No god components over 200 lines." },
      { id: "output", label: "Output Format", placeholder: "e.g., Code only, no explanations unless I ask. Use comments sparingly but well." },
    ];

    // ─── Hooks ─────────────────────────────────────────────────
    function useCopyFeedback() {
      const [copied, setCopied] = useState(null);
      const copy = useCallback(async (text, id) => {
        try {
          await navigator.clipboard.writeText(text);
          setCopied(id);
          setTimeout(() => setCopied(null), 1800);
        } catch { /* noop */ }
      }, []);
      return { copied, copy };
    }

    function useLocalStorage(key, initial) {
      const [value, setValue] = useState(() => {
        try {
          const saved = localStorage.getItem(key);
          return saved ? JSON.parse(saved) : initial;
        } catch { return initial; }
      });
      useEffect(() => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      }, [key, value]);
      return [value, setValue];
    }

    // ─── Components ────────────────────────────────────────────
    function NavTab({ label, active, onClick, badge }) {
      return (
        <button
          onClick={onClick}
          style={{
            padding: "10px 20px",
            fontSize: "14px",
            fontWeight: active ? 600 : 400,
            color: active ? "var(--ink)" : "var(--ink-muted)",
            background: active ? "var(--card)" : "transparent",
            border: "none",
            borderRadius: "var(--radius-md)",
            cursor: "pointer",
            transition: "all 0.2s ease",
            letterSpacing: "-0.01em",
            boxShadow: active ? "0 1px 4px rgba(0,0,0,0.08)" : "none",
            display: "flex",
            alignItems: "center",
            gap: "6px",
            fontFamily: "var(--font-body)",
          }}
        >
          {label}
          {badge && (
            <span style={{
              fontSize: "10px",
              background: "var(--sand-200)",
              color: "var(--sand-600)",
              padding: "1px 6px",
              borderRadius: "var(--radius-sm)",
              fontWeight: 600,
            }}>
              {badge}
            </span>
          )}
        </button>
      );
    }

    function SectionInput({ section, value, onChange }) {
      const ref = useRef(null);

      useEffect(() => {
        if (ref.current) {
          ref.current.style.height = "auto";
          ref.current.style.height = ref.current.scrollHeight + "px";
        }
      }, [value]);

      return (
        <div className="fade-up" style={{ marginBottom: "24px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "8px" }}>
            <label style={{
              fontSize: "12px", fontWeight: 600, color: "var(--ink)",
              letterSpacing: "0.06em", textTransform: "uppercase",
              fontFamily: "var(--font-body)",
            }}>
              {section.title}
            </label>
            <span style={{
              fontSize: "12px", color: "var(--ink-faint)", fontStyle: "italic",
              maxWidth: "60%", textAlign: "right", fontFamily: "var(--font-body)",
            }}>
              {section.hint}
            </span>
          </div>
          <textarea
            ref={ref}
            value={value || ""}
            onChange={(e) => onChange(section.id, e.target.value)}
            placeholder={section.placeholder}
            rows={2}
            style={{
              width: "100%", padding: "12px 14px", fontSize: "15px",
              lineHeight: 1.6, border: "1.5px solid var(--sand-300)",
              borderRadius: "var(--radius-md)", background: "var(--sand-50)",
              color: "var(--ink)", resize: "none", overflow: "hidden",
              outline: "none", fontFamily: "var(--font-serif)",
              transition: "border-color 0.2s ease, box-shadow 0.2s ease",
              boxSizing: "border-box",
            }}
          />
        </div>
      );
    }

    function CopyButton({ text, id, copied, onCopy, dark }) {
      const isCopied = copied === id;
      return (
        <button
          className={dark ? "btn-primary" : "btn-secondary"}
          onClick={() => onCopy(text, id)}
          style={{
            fontSize: "13px", padding: "6px 14px",
            background: isCopied ? "var(--sand-500)" : dark ? "var(--ink)" : "var(--sand-200)",
            color: isCopied ? "#fff" : dark ? "#fff" : "var(--sand-700)",
            border: "none", borderRadius: "var(--radius-sm)",
            cursor: "pointer", fontWeight: 500,
            transition: "all 0.2s ease",
            fontFamily: "var(--font-body)",
          }}
        >
          {isCopied ? "Copied \u2713" : "Copy"}
        </button>
      );
    }

    function OutputBlock({ label, text, id, copied, onCopy }) {
      if (!text) return null;
      return (
        <div className="fade-in" style={{
          marginTop: "32px", padding: "20px",
          background: "var(--sand-100)", borderRadius: "var(--radius-lg)",
          border: "1.5px solid var(--sand-300)",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" }}>
            <span style={{
              fontSize: "12px", fontWeight: 600, textTransform: "uppercase",
              letterSpacing: "0.06em", color: "var(--sand-600)",
              fontFamily: "var(--font-body)",
            }}>
              {label}
            </span>
            <CopyButton text={text} id={id} copied={copied} onCopy={onCopy} dark />
          </div>
          <pre style={{
            fontSize: "13.5px", lineHeight: 1.65, color: "var(--ink-light)",
            whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0,
            fontFamily: "var(--font-mono)",
          }}>
            {text}
          </pre>
        </div>
      );
    }

    function PromptTemplate({ template, toolName, copied, onCopy }) {
      const id = toolName + "-" + template.label;
      return (
        <div style={{
          background: "var(--sand-50)", border: "1.5px solid var(--sand-300)",
          borderRadius: "var(--radius-md)", padding: "14px 16px", marginBottom: "10px",
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
            <span style={{ fontSize: "13px", fontWeight: 600, color: "var(--ink)" }}>
              {template.label}
            </span>
            <CopyButton text={template.template} id={id} copied={copied} onCopy={onCopy} />
          </div>
          <pre style={{
            fontSize: "13px", lineHeight: 1.6, color: "#555",
            whiteSpace: "pre-wrap", wordBreak: "break-word", margin: 0,
            fontFamily: "var(--font-mono)",
          }}>
            {template.template}
          </pre>
        </div>
      );
    }

    // ─── Tabs ──────────────────────────────────────────────────
    function OutlineTab() {
      const [fields, setFields] = useLocalStorage("cc-outline", {});
      const { copied, copy } = useCopyFeedback();

      const handleChange = (id, value) => {
        setFields((prev) => ({ ...prev, [id]: value }));
      };

      const generatePrompt = () => {
        const parts = OUTLINE_SECTIONS
          .filter((s) => fields[s.id] && fields[s.id].trim())
          .map((s) => "**" + s.title + ":** " + fields[s.id].trim());
        if (parts.length === 0) return "";
        return "I'm starting a new project. Here's the brief:\n\n" + parts.join("\n\n") + "\n\nHelp me build this. Start with the first step only. Don't scaffold the whole thing \u2014 just the foundation I described above. Match my conventions and be opinionated about good patterns.";
      };

      const prompt = generatePrompt();
      const filledCount = OUTLINE_SECTIONS.filter((s) => fields[s.id] && fields[s.id].trim()).length;

      const handleClear = () => {
        setFields({});
      };

      return (
        <div>
          <p style={{
            fontSize: "15px", color: "var(--ink-muted)", marginBottom: "28px",
            lineHeight: 1.7, fontFamily: "var(--font-serif)", fontStyle: "italic",
          }}>
            "For which of you, desiring to build a tower, does not first sit down and count the cost?" &mdash; Luke 14:28
          </p>

          {OUTLINE_SECTIONS.map((section) => (
            <SectionInput key={section.id} section={section} value={fields[section.id]} onChange={handleChange} />
          ))}

          <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
            {filledCount > 0 && (
              <button
                onClick={handleClear}
                style={{
                  fontSize: "13px", padding: "8px 16px",
                  background: "transparent", color: "var(--ink-muted)",
                  border: "1.5px solid var(--sand-300)", borderRadius: "var(--radius-sm)",
                  cursor: "pointer", fontFamily: "var(--font-body)", fontWeight: 500,
                  transition: "all 0.2s ease",
                }}
              >
                Clear All
              </button>
            )}
          </div>

          {filledCount >= 3 && (
            <OutputBlock label="Generated Initial Prompt" text={prompt} id="outline" copied={copied} onCopy={copy} />
          )}
        </div>
      );
    }

    function ConfigTab() {
      const [fields, setFields] = useLocalStorage("cc-config", {});
      const { copied, copy } = useCopyFeedback();

      const handleChange = (id, value) => {
        setFields((prev) => ({ ...prev, [id]: value }));
      };

      const generateConfig = () => {
        const parts = CONFIG_FIELDS
          .filter((f) => fields[f.id] && fields[f.id].trim())
          .map((f) => "## " + f.label + "\n" + fields[f.id].trim());
        if (parts.length === 0) return "";
        return parts.join("\n\n");
      };

      const config = generateConfig();
      const filledCount = CONFIG_FIELDS.filter((f) => fields[f.id] && fields[f.id].trim()).length;

      const handleClear = () => {
        setFields({});
      };

      return (
        <div>
          <p style={{
            fontSize: "14px", color: "var(--ink-muted)", marginBottom: "28px",
            lineHeight: 1.6, fontFamily: "var(--font-body)",
          }}>
            Build a reusable system prompt. Fill in what matters, copy it out, and paste it wherever you need consistent AI behavior.
          </p>

          {CONFIG_FIELDS.map((field) => (
            <div key={field.id} className="fade-up" style={{ marginBottom: "20px" }}>
              <label style={{
                display: "block", fontSize: "12px", fontWeight: 600, color: "var(--ink)",
                marginBottom: "6px", letterSpacing: "0.04em", textTransform: "uppercase",
                fontFamily: "var(--font-body)",
              }}>
                {field.label}
              </label>
              <textarea
                value={fields[field.id] || ""}
                onChange={(e) => handleChange(field.id, e.target.value)}
                placeholder={field.placeholder}
                rows={2}
                style={{
                  width: "100%", padding: "12px 14px", fontSize: "14px",
                  lineHeight: 1.5, border: "1.5px solid var(--sand-300)",
                  borderRadius: "var(--radius-md)", background: "var(--sand-50)",
                  color: "var(--ink)", resize: "vertical", outline: "none",
                  fontFamily: "var(--font-mono)", fontSize: "13px",
                  transition: "border-color 0.2s ease, box-shadow 0.2s ease",
                  boxSizing: "border-box",
                }}
              />
            </div>
          ))}

          <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
            {filledCount > 0 && (
              <button
                onClick={handleClear}
                style={{
                  fontSize: "13px", padding: "8px 16px",
                  background: "transparent", color: "var(--ink-muted)",
                  border: "1.5px solid var(--sand-300)", borderRadius: "var(--radius-sm)",
                  cursor: "pointer", fontFamily: "var(--font-body)", fontWeight: 500,
                }}
              >
                Clear All
              </button>
            )}
          </div>

          {filledCount >= 2 && (
            <OutputBlock label="Your Config" text={config} id="config" copied={copied} onCopy={copy} />
          )}
        </div>
      );
    }

    function PlaybookTab() {
      const [activeTool, setActiveTool] = useState("claudeCode");
      const { copied, copy } = useCopyFeedback();
      const tool = TOOLS[activeTool];

      return (
        <div>
          {/* Tool Selector */}
          <div style={{ display: "flex", gap: "8px", marginBottom: "28px", flexWrap: "wrap" }}>
            {Object.entries(TOOLS).map(([key, t]) => (
              <button
                key={key}
                className="tool-btn"
                onClick={() => setActiveTool(key)}
                style={{
                  display: "flex", alignItems: "center", gap: "6px",
                  padding: "9px 16px", fontSize: "13px",
                  fontWeight: activeTool === key ? 600 : 400,
                  color: activeTool === key ? "#fff" : "#555",
                  background: activeTool === key ? t.color : "var(--sand-200)",
                  border: "none", borderRadius: "var(--radius-sm)",
                  cursor: "pointer", transition: "all 0.25s ease",
                  fontFamily: "var(--font-body)",
                }}
              >
                <span>{t.icon}</span>
                {t.name}
              </button>
            ))}
          </div>

          {/* Best For */}
          <div className="fade-in" key={activeTool + "-best"} style={{
            padding: "16px 18px",
            background: tool.color + "0A",
            borderLeft: "3px solid " + tool.color,
            borderRadius: "0 var(--radius-md) var(--radius-md) 0",
            marginBottom: "24px",
          }}>
            <span style={{
              fontSize: "11px", fontWeight: 700, textTransform: "uppercase",
              letterSpacing: "0.06em", color: tool.color,
            }}>
              Best For
            </span>
            <p style={{ fontSize: "15px", color: "var(--ink)", margin: "6px 0 0", lineHeight: 1.5 }}>
              {tool.bestFor}
            </p>
          </div>

          {/* Tips */}
          <div className="fade-in" key={activeTool + "-tips"} style={{ marginBottom: "28px" }}>
            <h3 style={{
              fontSize: "12px", fontWeight: 600, textTransform: "uppercase",
              letterSpacing: "0.06em", color: "var(--sand-600)", marginBottom: "14px",
              fontFamily: "var(--font-body)",
            }}>
              How to Get the Most Out of It
            </h3>
            {tool.tips.map((tip, i) => (
              <div key={i} style={{
                display: "flex", gap: "12px", marginBottom: "12px",
                fontSize: "14px", lineHeight: 1.6, color: "var(--ink-light)",
              }}>
                <span style={{
                  color: tool.color, fontWeight: 700, fontSize: "11px",
                  marginTop: "3px", flexShrink: 0,
                  fontFamily: "var(--font-mono)",
                }}>
                  {String(i + 1).padStart(2, "0")}
                </span>
                <span>{tip}</span>
              </div>
            ))}
          </div>

          {/* Prompt Templates */}
          <div className="fade-in" key={activeTool + "-templates"}>
            <h3 style={{
              fontSize: "12px", fontWeight: 600, textTransform: "uppercase",
              letterSpacing: "0.06em", color: "var(--sand-600)", marginBottom: "14px",
              fontFamily: "var(--font-body)",
            }}>
              Prompt Templates
            </h3>
            {tool.promptTemplates.map((t, i) => (
              <PromptTemplate key={i} template={t} toolName={activeTool} copied={copied} onCopy={copy} />
            ))}
          </div>
        </div>
      );
    }

    // ─── App Shell ─────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("outline");

      return (
        <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
          {/* Header */}
          <div style={{ padding: "36px 24px 0", maxWidth: "680px", margin: "0 auto" }}>
            <div style={{ marginBottom: "4px" }}>
              <span style={{
                fontSize: "11px", fontWeight: 600, letterSpacing: "0.12em",
                textTransform: "uppercase", color: "var(--sand-500)",
                fontFamily: "var(--font-body)",
              }}>
                AI Dev
              </span>
            </div>
            <h1 style={{
              fontSize: "32px", fontWeight: 400, letterSpacing: "-0.02em",
              color: "var(--ink)", margin: "0 0 6px",
              fontFamily: "var(--font-serif)",
            }}>
              Command Center
            </h1>
            <p style={{
              fontSize: "14px", color: "var(--ink-muted)", margin: 0, lineHeight: 1.5,
              fontFamily: "var(--font-body)",
            }}>
              Prompt well. Context well. Build well.
            </p>
          </div>

          {/* Nav */}
          <div style={{ maxWidth: "680px", margin: "20px auto 0", padding: "0 24px" }}>
            <div style={{
              display: "flex", gap: "4px",
              background: "var(--sand-200)", borderRadius: "var(--radius-lg)",
              padding: "4px",
            }}>
              <NavTab label="Outline" active={tab === "outline"} onClick={() => setTab("outline")} />
              <NavTab label="Config" active={tab === "config"} onClick={() => setTab("config")} />
              <NavTab label="Playbook" active={tab === "playbook"} onClick={() => setTab("playbook")} badge="4 tools" />
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth: "680px", margin: "24px auto 0", padding: "0 24px 60px" }}>
            <div style={{
              background: "var(--card)",
              borderRadius: "var(--radius-xl)",
              padding: "28px 24px",
              boxShadow: "0 1px 8px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03)",
            }}>
              {tab === "outline" && <OutlineTab />}
              {tab === "config" && <ConfigTab />}
              {tab === "playbook" && <PlaybookTab />}
            </div>
          </div>

          {/* Footer */}
          <div style={{
            textAlign: "center", padding: "0 24px 32px",
            fontSize: "12px", color: "var(--ink-faint)",
            fontFamily: "var(--font-body)",
          }}>
            Built to compound. Ship faithfully.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
