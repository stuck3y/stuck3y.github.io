<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Billy</title>
<meta name="theme-color" content="#1f7a4d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.webmanifest" />
<script src="../lib/pwa.js" defer></script>
<style>
  :root {
    --bg: #fbfbfd;
    --surface: #ffffff;
    --fg: #1d1d1f;
    --fg-muted: #6e6e73;
    --rule: #e5e5e7;
    --field: #f0f0f2;
    --pos: #1f7a4d;
    --neg: #c92a2a;
    --accent: #1f7a4d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0c;
      --surface: #16161a;
      --fg: #f5f5f7;
      --fg-muted: #86868b;
      --rule: #2a2a2c;
      --field: #1f1f24;
      --pos: #3ddc84;
      --neg: #ff5a52;
      --accent: #3ddc84;
    }
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    min-height: 100dvh;
    padding:
      calc(env(safe-area-inset-top) + 28px)
      env(safe-area-inset-right)
      calc(env(safe-area-inset-bottom) + 40px)
      env(safe-area-inset-left);
  }
  main {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .nav { margin-bottom: 18px; font-size: 14px; }
  .nav a { color: var(--fg-muted); text-decoration: none; }
  .nav a:hover { color: var(--accent); }

  .wordmark {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 22px;
  }
  .wordmark h1 {
    margin: 0;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .wordmark .tag { font-size: 14px; color: var(--fg-muted); }

  /* Summary card */
  .summary {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 16px;
    padding: 22px 22px 18px;
    margin-bottom: 20px;
  }
  .on-hand-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }
  .on-hand-row label {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg-muted);
  }
  .on-hand-field {
    display: flex;
    align-items: baseline;
    font-size: 24px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .on-hand-field .currency { color: var(--fg-muted); margin-right: 2px; font-size: 20px; }
  #onHand {
    width: 7ch;
    text-align: right;
    border: none;
    background: transparent;
    color: var(--fg);
    font: inherit;
    padding: 2px 4px;
    border-bottom: 2px solid var(--rule);
    outline: none;
  }
  #onHand:focus { border-bottom-color: var(--accent); }

  .net {
    border-top: 1px solid var(--rule);
    padding-top: 16px;
  }
  .net .net-label {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 4px;
  }
  .net .net-value {
    font-size: clamp(40px, 13vw, 56px);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .net .net-value.pos { color: var(--pos); }
  .net .net-value.neg { color: var(--neg); }
  .net .net-sub {
    margin-top: 8px;
    font-size: 14px;
    color: var(--fg-muted);
  }
  .net .net-sub strong { color: var(--fg); font-weight: 600; }

  /* Add form */
  form.add {
    display: grid;
    grid-template-columns: 1fr 30%;
    gap: 10px;
    margin-bottom: 8px;
  }
  form.add .full { grid-column: 1 / -1; }
  form.add input {
    width: 100%;
    padding: 13px 14px;
    font-size: 16px;
    background: var(--field);
    border: 1px solid transparent;
    border-radius: 10px;
    color: var(--fg);
    outline: none;
  }
  form.add input::placeholder { color: var(--fg-muted); }
  form.add input:focus { border-color: var(--accent); }
  form.add button {
    grid-column: 1 / -1;
    padding: 13px;
    font-size: 16px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  @media (prefers-color-scheme: dark) {
    form.add button { color: #07120c; }
  }
  form.add button:active { filter: brightness(0.92); }

  .hint {
    font-size: 12px;
    color: var(--fg-muted);
    margin: 14px 2px 8px;
  }

  /* Bill list */
  ul.bills { list-style: none; margin: 0; padding: 0; }
  ul.bills li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 2px;
    border-top: 1px solid var(--rule);
  }
  ul.bills li:last-child { border-bottom: 1px solid var(--rule); }

  .check {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid var(--rule);
    background: transparent;
    cursor: pointer;
    display: grid;
    place-items: center;
    color: transparent;
    font-size: 14px;
    padding: 0;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  li.paid .check {
    background: var(--pos);
    border-color: var(--pos);
    color: #fff;
  }

  .bill-text { flex: 1; min-width: 0; }
  .bill-name {
    font-size: 16px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bill-meta { font-size: 13px; color: var(--fg-muted); margin-top: 2px; }
  .bill-meta .due-soon { color: var(--neg); }
  li.paid .bill-name, li.paid .bill-amount { text-decoration: line-through; color: var(--fg-muted); }

  .bill-right { text-align: right; flex-shrink: 0; }
  .bill-amount {
    font-size: 16px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .running {
    font-size: 12px;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    color: var(--fg-muted);
  }
  .running.short { color: var(--neg); font-weight: 600; }

  .del {
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    font-size: 20px;
    line-height: 1;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    cursor: pointer;
  }
  .del:hover { color: var(--neg); }

  .empty {
    padding: 28px 2px;
    color: var(--fg-muted);
    font-size: 15px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <nav class="nav"><a href="../../">&larr; Jon's Data Company</a></nav>

  <div class="wordmark">
    <h1>Billy</h1>
    <span class="tag">bills, out of your head</span>
  </div>

  <section class="summary" aria-label="Summary">
    <div class="on-hand-row">
      <label for="onHand">On hand</label>
      <div class="on-hand-field">
        <span class="currency">$</span>
        <input id="onHand" type="text" inputmode="decimal" value="0" aria-label="Cash on hand" />
      </div>
    </div>
    <div class="net">
      <div class="net-label">Net after unpaid bills</div>
      <div class="net-value pos" id="netValue">$0</div>
      <div class="net-sub" id="netSub"></div>
    </div>
  </section>

  <form class="add" id="addForm" autocomplete="off">
    <input class="full" id="nameInput" type="text" placeholder="Bill (e.g. Rent, Card, Phone)" required maxlength="60" />
    <input id="amountInput" type="text" inputmode="decimal" placeholder="Amount" required />
    <input id="dueInput" type="date" aria-label="Due date (optional)" />
    <button type="submit">Add bill</button>
  </form>

  <p class="hint" id="hint">Dump every bill in. Set what you've got on hand. Watch where it runs out.</p>

  <ul class="bills" id="billList"></ul>
  <p class="empty" id="empty" hidden>No bills yet. Add the ones rattling around your head.</p>
</main>

<script>
(() => {
  "use strict";
  const KEY = "ledger.v1";
  const fmt = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 });

  const el = {
    onHand: document.getElementById("onHand"),
    net: document.getElementById("netValue"),
    netSub: document.getElementById("netSub"),
    form: document.getElementById("addForm"),
    name: document.getElementById("nameInput"),
    amount: document.getElementById("amountInput"),
    due: document.getElementById("dueInput"),
    list: document.getElementById("billList"),
    empty: document.getElementById("empty"),
  };

  let state = load();

  function load() {
    try {
      const raw = JSON.parse(localStorage.getItem(KEY));
      if (raw && typeof raw === "object") {
        return {
          onHand: Number(raw.onHand) || 0,
          bills: Array.isArray(raw.bills) ? raw.bills.map(normalizeBill).filter(Boolean) : [],
        };
      }
    } catch (_) {}
    return { onHand: 0, bills: [] };
  }

  function normalizeBill(b) {
    if (!b || typeof b !== "object") return null;
    const amount = Number(b.amount);
    if (!isFinite(amount)) return null;
    return {
      id: String(b.id || (Date.now() + "-" + Math.random().toString(36).slice(2))),
      name: String(b.name || "Bill").slice(0, 60),
      amount: Math.max(0, amount),
      due: typeof b.due === "string" ? b.due : "",
      paid: !!b.paid,
    };
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (_) {}
  }

  function parseAmount(str) {
    const n = parseFloat(String(str).replace(/[^0-9.\-]/g, ""));
    return isFinite(n) ? n : NaN;
  }

  // Sort: unpaid first, by due date (dated before undated), then paid at the bottom.
  function sortedBills() {
    return state.bills.slice().sort((a, b) => {
      if (a.paid !== b.paid) return a.paid ? 1 : -1;
      if (a.due && b.due) return a.due < b.due ? -1 : a.due > b.due ? 1 : 0;
      if (a.due) return -1;
      if (b.due) return 1;
      return 0;
    });
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function dueLabel(due) {
    if (!due) return "";
    const parts = due.split("-");
    const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    if (isNaN(d)) return "";
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const days = Math.round((d - today) / 86400000);
    const date = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    if (days < 0) return { text: "Overdue · " + date, soon: true };
    if (days === 0) return { text: "Due today", soon: true };
    if (days === 1) return { text: "Due tomorrow", soon: true };
    if (days <= 7) return { text: "Due in " + days + " days · " + date, soon: true };
    return { text: "Due " + date, soon: false };
  }

  function render() {
    el.onHand.value = String(state.onHand);

    const unpaid = state.bills.filter((b) => !b.paid);
    const owed = unpaid.reduce((s, b) => s + b.amount, 0);
    const net = state.onHand - owed;

    el.net.textContent = (net < 0 ? "-" : "") + fmt.format(Math.abs(net));
    el.net.classList.toggle("pos", net >= 0);
    el.net.classList.toggle("neg", net < 0);

    if (state.bills.length === 0) {
      el.netSub.textContent = "";
    } else if (net >= 0) {
      el.netSub.innerHTML = "You can cover all " + unpaid.length + " unpaid · owed <strong>" + fmt.format(owed) + "</strong>";
    } else {
      el.netSub.innerHTML = "Short <strong>" + fmt.format(Math.abs(net)) + "</strong> · owed " + fmt.format(owed);
    }

    el.list.innerHTML = "";
    const ordered = sortedBills();
    el.empty.hidden = ordered.length > 0;

    let running = state.onHand;
    for (const b of ordered) {
      const li = document.createElement("li");
      if (b.paid) li.className = "paid";

      const check = document.createElement("button");
      check.className = "check";
      check.type = "button";
      check.setAttribute("aria-label", b.paid ? "Mark unpaid" : "Mark paid");
      check.textContent = "✓";
      check.addEventListener("click", () => togglePaid(b.id));

      const text = document.createElement("div");
      text.className = "bill-text";
      const name = document.createElement("div");
      name.className = "bill-name";
      name.textContent = b.name;
      text.appendChild(name);
      const due = dueLabel(b.due);
      if (due) {
        const meta = document.createElement("div");
        meta.className = "bill-meta";
        const span = document.createElement("span");
        if (due.soon && !b.paid) span.className = "due-soon";
        span.textContent = due.text;
        meta.appendChild(span);
        text.appendChild(meta);
      }

      const right = document.createElement("div");
      right.className = "bill-right";
      const amt = document.createElement("div");
      amt.className = "bill-amount";
      amt.textContent = fmt.format(b.amount);
      right.appendChild(amt);

      if (!b.paid) {
        running -= b.amount;
        const run = document.createElement("div");
        run.className = "running" + (running < 0 ? " short" : "");
        run.textContent = (running < 0 ? "short " : "left ") +
          (running < 0 ? "-" : "") + fmt.format(Math.abs(running));
        right.appendChild(run);
      }

      const del = document.createElement("button");
      del.className = "del";
      del.type = "button";
      del.setAttribute("aria-label", "Delete " + b.name);
      del.innerHTML = "&times;";
      del.addEventListener("click", () => removeBill(b.id));

      li.append(check, text, right, del);
      el.list.appendChild(li);
    }
  }

  function addBill(name, amount, due) {
    state.bills.push({
      id: Date.now() + "-" + Math.random().toString(36).slice(2),
      name: name.slice(0, 60),
      amount: Math.max(0, amount),
      due: due || "",
      paid: false,
    });
    save();
    render();
  }

  function togglePaid(id) {
    const b = state.bills.find((x) => x.id === id);
    if (b) { b.paid = !b.paid; save(); render(); }
  }

  function removeBill(id) {
    state.bills = state.bills.filter((x) => x.id !== id);
    save();
    render();
  }

  el.form.addEventListener("submit", (e) => {
    e.preventDefault();
    const name = el.name.value.trim();
    const amount = parseAmount(el.amount.value);
    if (!name || !isFinite(amount)) return;
    addBill(name, amount, el.due.value);
    el.form.reset();
    el.name.focus();
  });

  function commitOnHand() {
    const v = parseAmount(el.onHand.value);
    state.onHand = isFinite(v) ? v : 0;
    save();
    render();
  }
  el.onHand.addEventListener("change", commitOnHand);
  el.onHand.addEventListener("blur", commitOnHand);
  el.onHand.addEventListener("focus", () => el.onHand.select());

  render();
})();
</script>
</body>
</html>
