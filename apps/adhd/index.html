<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ADHD Playbook">
<title>The ADHD Playbook</title>
<style>
  :root {
    --bg: #F5F0EB;
    --surface: #FFFFFF;
    --text: #2A2522;
    --text-secondary: #6B6360;
    --text-tertiary: #9E9693;
    --accent: #3B6F9E;
    --accent-light: #E8F0F7;
    --warm: #8B6914;
    --warm-light: #FDF8EE;
    --border: rgba(0,0,0,0.06);
    --radius: 16px;
    --radius-sm: 12px;
    --shadow-sm: 0 1px 3px rgba(60,40,20,0.05), 0 1px 2px rgba(60,40,20,0.08);
    --shadow-md: 0 4px 16px rgba(60,40,20,0.07), 0 1px 4px rgba(60,40,20,0.05);
    --font: -apple-system, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    --font-serif: 'New York', 'Iowan Old Style', Georgia, serif;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

html {
font-family: var(–font);
background: var(–bg);
color: var(–text);
-webkit-font-smoothing: antialiased;
-webkit-text-size-adjust: 100%;
-webkit-tap-highlight-color: transparent;
}

body {
min-height: 100dvh;
padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
overflow-x: hidden;
background: linear-gradient(180deg, #F5F0EB 0%, #EDE6DF 50%, #F0EBE5 100%);
background-attachment: fixed;
}

/* ===== APP SHELL ===== */
.app {
max-width: 430px;
margin: 0 auto;
padding: 0 20px;
padding-bottom: 48px;
}

/* ===== HEADER ===== */
.header {
padding: 56px 0 8px;
text-align: center;
}

.header h1 {
font-size: 28px;
font-weight: 700;
letter-spacing: -0.5px;
color: var(–text);
line-height: 1.15;
}

.header .prompt {
margin-top: 12px;
font-size: 17px;
color: var(–text-secondary);
font-weight: 400;
line-height: 1.4;
}

.header .prompt em {
font-style: normal;
color: var(–text);
font-weight: 500;
}

/* ===== BUTTON GRID ===== */
.feelings {
display: flex;
flex-direction: column;
gap: 10px;
margin-top: 28px;
}

.feeling-btn {
appearance: none;
-webkit-appearance: none;
border: none;
background: var(–surface);
border-radius: var(–radius);
padding: 18px 20px 18px 22px;
text-align: left;
cursor: pointer;
box-shadow: var(–shadow-sm);
transition: transform 0.2s ease, box-shadow 0.2s ease;
display: flex;
align-items: center;
gap: 14px;
width: 100%;
position: relative;
overflow: hidden;
border-left: 4px solid transparent;
}

.feeling-btn:active {
transform: scale(0.97);
box-shadow: none;
}

.feeling-btn .label-group {
flex: 1;
}

.feeling-btn .prefix {
font-size: 12px;
font-weight: 500;
color: var(–text-tertiary);
letter-spacing: 0.3px;
text-transform: uppercase;
line-height: 1;
margin-bottom: 4px;
}

.feeling-btn .label {
font-size: 18px;
font-weight: 600;
color: var(–text);
letter-spacing: -0.2px;
line-height: 1.25;
}

.feeling-btn .chevron {
width: 20px;
height: 20px;
flex-shrink: 0;
color: var(–text-tertiary);
}

/* per-button tint: colored left border + faint background wash */
.feeling-btn[data-key=“cant-start”]     { border-left-color: #D4A06A; background: linear-gradient(90deg, #FBF3EB 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“cant-focus”]     { border-left-color: #6998BF; background: linear-gradient(90deg, #EDF3F9 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“cant-decide”]    { border-left-color: #A98DC5; background: linear-gradient(90deg, #F4EFF9 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“feeling-behind”]  { border-left-color: #C47A7A; background: linear-gradient(90deg, #F9EDED 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“overwhelmed”]     { border-left-color: #D9A54B; background: linear-gradient(90deg, #FBF4E6 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“restless”]        { border-left-color: #6DAE8A; background: linear-gradient(90deg, #ECF5F0 0%, #FFFFFF 40%); }
.feeling-btn[data-key=“feeling-nothing”] { border-left-color: #94A3AF; background: linear-gradient(90deg, #EFF2F4 0%, #FFFFFF 40%); }

/* ===== RESULT VIEW ===== */
.result-view {
display: none;
animation: fadeUp 0.35s ease both;
}

.result-view.active { display: block; }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.back-btn {
appearance: none;
-webkit-appearance: none;
border: none;
background: none;
cursor: pointer;
font-size: 17px;
font-weight: 400;
color: var(–accent);
padding: 16px 0;
display: flex;
align-items: center;
gap: 4px;
margin-top: 40px;
}

.back-btn svg {
width: 18px;
height: 18px;
}

.result-header {
margin-top: 8px;
margin-bottom: 32px;
}

.result-header .feeling-label {
font-size: 14px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
color: var(–play-color, var(–text-tertiary));
margin-bottom: 6px;
}

.result-header h2 {
font-size: 26px;
font-weight: 700;
letter-spacing: -0.4px;
color: var(–text);
line-height: 1.2;
}

/* ===== CARDS ===== */
.card {
background: var(–surface);
border-radius: var(–radius);
box-shadow: var(–shadow-sm);
padding: 22px;
margin-bottom: 14px;
}

.card-label {
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.8px;
margin-bottom: 10px;
color: var(–text-tertiary);
}

/* Strategy card */
.card.strategy {
background: var(–accent-light);
box-shadow: none;
border-top: 3px solid var(–play-color, var(–accent));
}

.card.strategy .card-label { color: var(–accent); }

.card.strategy .content {
font-size: 19px;
font-weight: 500;
line-height: 1.45;
color: var(–text);
letter-spacing: -0.1px;
}

/* Verse card */
.card.verse {
background: var(–warm-light);
box-shadow: none;
}

.card.verse .card-label { color: var(–warm); }

.card.verse .content {
font-family: var(–font-serif);
font-size: 17px;
font-style: italic;
line-height: 1.55;
color: #4A3F2F;
}

/* Mantras */
.card.mantras .content {
font-size: 16px;
line-height: 1.5;
color: var(–text-secondary);
}

.card.mantras .mantra-item {
padding: 8px 0;
}

.card.mantras .mantra-item + .mantra-item {
border-top: 1px solid var(–border);
}

.card.mantras .mantra-text {
font-weight: 500;
color: var(–text);
font-size: 16px;
}

/* Resources */
.card.resources .resource-link {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 0;
text-decoration: none;
color: var(–text);
-webkit-tap-highlight-color: transparent;
}

.card.resources .resource-link + .resource-link {
border-top: 1px solid var(–border);
}

.card.resources .resource-icon {
width: 36px;
height: 36px;
border-radius: 10px;
background: var(–accent-light);
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}

.card.resources .resource-icon svg {
width: 16px;
height: 16px;
color: var(–accent);
}

.card.resources .resource-title {
font-size: 15px;
font-weight: 500;
line-height: 1.35;
flex: 1;
color: var(–text);
}

.card.resources .resource-arrow {
width: 16px;
height: 16px;
color: var(–text-tertiary);
flex-shrink: 0;
}

/* Shuffle button */
.shuffle-btn {
appearance: none;
-webkit-appearance: none;
border: none;
background: var(–surface);
border-radius: var(–radius);
box-shadow: var(–shadow-sm);
padding: 16px;
width: 100%;
cursor: pointer;
font-size: 15px;
font-weight: 500;
color: var(–text-secondary);
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
margin-top: 8px;
margin-bottom: 20px;
transition: transform 0.15s ease;
letter-spacing: -0.1px;
}

.shuffle-btn:active { transform: scale(0.97); }

.shuffle-btn svg {
width: 16px;
height: 16px;
}

/* ===== HIDDEN STATE ===== */
.home-view.hidden { display: none; }
</style>

</head>
<body>
<div class="app">

  <!-- HOME VIEW -->

  <div class="home-view" id="homeView">
    <div class="header">
      <h1>The ADHD Playbook</h1>
      <p class="prompt">Right now, <em>I&#8217;m feeling...</em></p>
    </div>
    <div class="feelings" id="feelings"></div>
  </div>

  <!-- RESULT VIEW -->

  <div class="result-view" id="resultView">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <div class="result-header">
      <div class="feeling-label" id="resultFeeling"></div>
      <h2 id="resultTitle">Here&#8217;s your play.</h2>
    </div>
    <div id="resultCards"></div>
    <button class="shuffle-btn" id="shuffleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Different play
    </button>
  </div>

</div>

<script>
// ============================================================
// DATA — keys use simple hyphenated slugs (no apostrophes)
// ============================================================

      { title: "Atomic Habits: Make It Easy", url: "https://jamesclear.com/habit-guide" },

    ],
    verses: [
      "He leads me beside still waters. He restores my soul.\u2003\u2014 Psalm 23:2\u20133",
      "My grace is sufficient for you, for my power is made perfect in weakness.\u2003\u2014 2 Corinthians 12:9",
      "The Lord is my shepherd; I shall not want.\u2003\u2014 Psalm 23:1",
      "Weeping may tarry for the night, but joy comes with the morning.\u2003\u2014 Psalm 30:5",
      "Take heart; I have overcome the world.\u2003\u2014 John 16:33"
    ],
    mantras: [
      "Rest is not failure. It\u2019s faithfulness to your limits.",
      "Flat is temporary. It\u2019s weather, not climate.",
      "You don\u2019t have to feel God\u2019s presence to be in it.",
      "Today, existing is enough.",
      "Even the strongest trees have seasons with no leaves."
    ],
    resources: [
      { title: "How to ADHD: ADHD and Depression", url: "https://www.youtube.com/watch?v=iRYvuS9OxEg" },
      { title: "Barkley: ADHD and Emotion", url: "https://www.youtube.com/watch?v=7sPIF1gNy_o" },
      { title: "Spurgeon\u2019s Depression (Desiring God)", url: "https://www.desiringgod.org/articles/charles-spurgeons-darkest-valley" },
      { title: "Paul Tripp: Suffering and Hope", url: "https://www.youtube.com/watch?v=ZXCiNhAjm8g" },
      { title: "Piper: When the Darkness Will Not Lift", url: "https://www.desiringgod.org/books/when-the-darkness-will-not-lift" }
    ]
  }
};

// ============================================================
// LOGIC
// ============================================================
function pick(arr, n) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.slice(0, n);
}

function getPlay(key) {
  const b = PLAYBOOK[key];
  return {
    strategy: pick(b.strategies, 1)[0],
    verse: pick(b.verses, 1)[0],
    mantras: pick(b.mantras, 2),
    resources: pick(b.resources, 2)
  };
}

// ============================================================
// RENDER
// ============================================================
const homeView = document.getElementById("homeView");
const resultView = document.getElementById("resultView");
const feelingsEl = document.getElementById("feelings");
const resultFeeling = document.getElementById("resultFeeling");
const resultCards = document.getElementById("resultCards");
const backBtn = document.getElementById("backBtn");
const shuffleBtn = document.getElementById("shuffleBtn");

const chevronSVG = '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';

const linkIconSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

const arrowSVG = '<svg class="resource-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>';

const feelingColors = {
  "cant-start": "#D4A06A",
  "cant-focus": "#6998BF",
  "cant-decide": "#A98DC5",
  "feeling-behind": "#C47A7A",
  "overwhelmed": "#D9A54B",
  "restless": "#6DAE8A",
  "feeling-nothing": "#94A3AF"
};

// Build buttons
Object.keys(PLAYBOOK).forEach(key => {
  const b = PLAYBOOK[key];
  const btn = document.createElement("button");
  btn.className = "feeling-btn";
  btn.dataset.key = key;
  btn.innerHTML = `
    <div class="label-group">
      <div class="prefix">I\u2019m feeling</div>
      <div class="label">${b.label}</div>
    </div>
    ${chevronSVG}
  `;
  btn.addEventListener("click", () => showResult(key));
  feelingsEl.appendChild(btn);
});

let currentKey = null;

function showResult(key) {
  currentKey = key;
  const play = getPlay(key);
  const b = PLAYBOOK[key];

  resultView.style.setProperty("--play-color", feelingColors[key]);
  resultFeeling.textContent = "I\u2019m feeling " + b.label;

  resultCards.innerHTML = `
    <div class="card strategy">
      <div class="card-label">Try this</div>
      <div class="content">${play.strategy}</div>
    </div>
    <div class="card verse">
      <div class="card-label">Scripture</div>
      <div class="content">${play.verse}</div>
    </div>
    <div class="card mantras">
      <div class="card-label">Mantras</div>
      <div class="content">
        ${play.mantras.map(m => `<div class="mantra-item"><span class="mantra-text">${m}</span></div>`).join("")}
      </div>
    </div>
    <div class="card resources">
      <div class="card-label">Go deeper</div>
      ${play.resources.map(r => `
        <a class="resource-link" href="${r.url}" target="_blank" rel="noopener">
          <div class="resource-icon">${linkIconSVG}</div>
          <span class="resource-title">${r.title}</span>
          ${arrowSVG}
        </a>
      `).join("")}
    </div>
  `;

  homeView.classList.add("hidden");
  resultView.classList.remove("active");
  void resultView.offsetWidth;
  resultView.classList.add("active");
  window.scrollTo({ top: 0, behavior: "instant" });
}

backBtn.addEventListener("click", () => {
  resultView.classList.remove("active");
  homeView.classList.remove("hidden");
  currentKey = null;
  window.scrollTo({ top: 0, behavior: "instant" });
});

shuffleBtn.addEventListener("click", () => {
  if (currentKey) showResult(currentKey);
});
</script>

</body>
