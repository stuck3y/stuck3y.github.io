<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>big</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=JetBrains+Mono:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5efe6;
    --fg: #2a2520;
    --muted: #8a8275;
    --rim: rgba(42, 37, 32, 0.10);
    --tick: rgba(42, 37, 32, 0.22);
    --label: rgba(42, 37, 32, 0.42);
    --accent: #b85d3c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1715;
      --fg: #d8cfc2;
      --muted: #6b6357;
      --rim: rgba(216, 207, 194, 0.12);
      --tick: rgba(216, 207, 194, 0.28);
      --label: rgba(216, 207, 194, 0.48);
      --accent: #d97a4f;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  main {
    height: 100vh;
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    align-items: center;
    justify-items: center;
    padding: 1rem 1rem 2rem;
    gap: 1rem;
  }

  .brand {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 400;
    font-variation-settings: "opsz" 12;
    letter-spacing: 0.22em;
    text-transform: lowercase;
    padding: 1rem 1.5rem;
    margin-top: 0.25rem;
    opacity: 0.55;
    transition: opacity 220ms ease;
    user-select: none;
  }
  .brand:hover, .brand:focus-visible { opacity: 1; outline: none; }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    width: 100%;
  }

  .clock {
    position: relative;
    width: min(80vmin, 600px);
    aspect-ratio: 1;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: manipulation;
  }
  .clock svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }

  .numerals {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-weight: 300;
    font-size: clamp(4.25rem, 17.5vmin, 11.5rem);
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    pointer-events: none;
    transition: color 700ms ease, opacity 320ms ease;
  }
  .numerals.idle { opacity: 0.42; }
  .numerals.armed { opacity: 0.85; }
  .numerals.paused { opacity: 0.62; }
  .numerals.done { color: var(--accent); opacity: 1; }
  .numerals.copied {
    color: var(--accent);
    animation: copy-pop 1100ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes copy-pop {
    0%   { transform: scale(1); }
    14%  { transform: scale(1.045); }
    100% { transform: scale(1); }
  }

  .arc {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1.4;
    stroke-linecap: round;
    opacity: 0.85;
    transition: opacity 400ms ease;
  }
  .arc.done { opacity: 0; }

  /* task label — tap to cycle forward */
  .label {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(1.1rem, 2.8vmin, 1.5rem);
    color: var(--fg);
    opacity: 0.72;
    padding: 0.6rem 1.4rem;
    line-height: 1.35;
    max-width: min(82vmin, 560px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
  }
  .label.visible { display: block; }
  .label:focus-visible { outline: 1px dashed var(--rim); outline-offset: 4px; border-radius: 2px; }
  .label.flip { animation: task-flip 280ms cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes task-flip {
    0%   { opacity: 0.08; transform: translateY(6px); }
    100% { opacity: 0.72; transform: translateY(0); }
  }

  .fab {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 50%;
    border: 1px solid var(--rim);
    background: var(--bg);
    color: var(--muted);
    font-family: inherit;
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 220ms ease, border-color 220ms ease;
    user-select: none;
    z-index: 20;
  }
  .fab:hover, .fab:focus-visible {
    opacity: 1;
    border-color: var(--muted);
    outline: none;
  }
  .fab.hidden { opacity: 0; pointer-events: none; }

  .sheet {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem 2rem 5rem;
    z-index: 10;
  }
  .sheet.open { display: flex; }
  .sheet textarea {
    width: 100%;
    max-width: 32rem;
    height: 60vh;
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--rim);
    border-radius: 4px;
    padding: 1.25rem;
    font-family: "Fraunces", serif;
    font-size: 1.1rem;
    line-height: 1.55;
    resize: none;
    outline: none;
    transition: border-color 200ms ease;
  }
  .sheet textarea:focus { border-color: var(--accent); }
  .sheet textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<main>
  <button class="brand" id="brand" title="reset">big</button>

  <div class="stage">
    <div class="clock" id="clock" role="button" aria-label="timer">
      <svg viewBox="-100 -100 200 200" aria-hidden="true">
        <circle cx="0" cy="0" r="92" fill="none" stroke="var(--rim)" stroke-width="0.6"/>
        <g id="ticks"></g>
        <g id="labels"></g>
        <path id="arc" class="arc" d=""/>
      </svg>
      <div class="numerals idle" id="numerals">0:00</div>
    </div>

    <button class="label" id="label" aria-label="next task"></button>
  </div>

  <div></div>
</main>

<button class="fab" id="fab" title="tasks" aria-label="tasks">+</button>

<div class="sheet" id="sheet">
  <textarea id="textarea" placeholder="one task per line&hellip;" spellcheck="false"></textarea>
</div>

<script>
  const $ = id => document.getElementById(id);

  const clockEl    = $('clock');
  const numeralsEl = $('numerals');
  const arcEl      = $('arc');
  const ticksEl    = $('ticks');
  const labelsEl   = $('labels');
  const labelEl    = $('label');
  const brandEl    = $('brand');
  const fabEl      = $('fab');
  const sheetEl    = $('sheet');
  const taEl       = $('textarea');

  const ARC_RADIUS  = 90;
  const MAX_MS      = 60 * 60 * 1000;
  const QUICK_MARKS = [2, 10, 20, 50];
  const TICK_LABEL_RADIUS = 76;
  const STATE_KEY = 'big-state';
  const TASKS_KEY = 'big-tasks';
  const LONG_PRESS_MS = 600;
  const COPY_HOLD_MS  = 1100;

  // mode: 'idle' | 'armed' | 'running' | 'paused' | 'done'
  let mode      = 'idle';
  let direction = null;    // 'up' | 'down'
  let targetMs  = 0;
  let elapsedMs = 0;
  let startedAt = 0;       // ms-epoch; 0 when not running
  let tickHandle = null;
  let taskIndex = 0;
  let copyShown = null;    // { text, until } | null

  // ── clock face decorations ───────────────────────────────

  (function buildTicks () {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
      const major = i % 5 === 0;
      const r1 = major ? 84 : 87;
      const r2 = 90;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', (Math.cos(angle) * r1).toFixed(2));
      line.setAttribute('y1', (Math.sin(angle) * r1).toFixed(2));
      line.setAttribute('x2', (Math.cos(angle) * r2).toFixed(2));
      line.setAttribute('y2', (Math.sin(angle) * r2).toFixed(2));
      line.setAttribute('stroke', major ? 'var(--tick)' : 'var(--rim)');
      line.setAttribute('stroke-width', major ? '0.9' : '0.45');
      line.setAttribute('stroke-linecap', 'round');
      frag.appendChild(line);
    }
    ticksEl.appendChild(frag);
  })();

  (function buildLabels () {
    const frag = document.createDocumentFragment();
    QUICK_MARKS.forEach(mins => {
      const angle = (mins / 60) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(angle) * TICK_LABEL_RADIUS;
      const y = Math.sin(angle) * TICK_LABEL_RADIUS;
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', x.toFixed(2));
      text.setAttribute('y', y.toFixed(2));
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', 'var(--label)');
      text.setAttribute('font-family', '"JetBrains Mono", ui-monospace, monospace');
      text.setAttribute('font-size', '5.6');
      text.setAttribute('font-weight', '300');
      text.setAttribute('letter-spacing', '-0.04em');
      text.textContent = String(mins);
      frag.appendChild(text);
    });
    labelsEl.appendChild(frag);
  })();

  // ── time math ────────────────────────────────────────────

  function fmt (ms) {
    const total = Math.max(0, Math.round(ms / 1000));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function describeArc (fraction) {
    if (fraction <= 0) return '';
    if (fraction >= 1) fraction = 0.99999;
    const angle = fraction * Math.PI * 2 - Math.PI / 2;
    const x = (Math.cos(angle) * ARC_RADIUS).toFixed(3);
    const y = (Math.sin(angle) * ARC_RADIUS).toFixed(3);
    const large = fraction > 0.5 ? 1 : 0;
    return `M 0 ${-ARC_RADIUS} A ${ARC_RADIUS} ${ARC_RADIUS} 0 ${large} 1 ${x} ${y}`;
  }

  function liveElapsed () {
    const raw = mode === 'running' ? elapsedMs + (Date.now() - startedAt) : elapsedMs;
    return raw;
  }

  function displayMs () {
    if (direction === 'down') return Math.max(0, targetMs - liveElapsed());
    if (direction === 'up')   return Math.min(MAX_MS, liveElapsed());
    return 0;
  }

  // ── render ───────────────────────────────────────────────

  function render () {
    if (copyShown && Date.now() < copyShown.until) {
      numeralsEl.textContent = copyShown.text;
    } else {
      numeralsEl.textContent = fmt(displayMs());
    }

    numeralsEl.classList.remove('idle','armed','paused','done');
    arcEl.classList.toggle('done', mode === 'done');

    if (mode === 'idle')   numeralsEl.classList.add('idle');
    if (mode === 'armed')  numeralsEl.classList.add('armed');
    if (mode === 'paused') numeralsEl.classList.add('paused');
    if (mode === 'done')   numeralsEl.classList.add('done');

    if (direction === 'down' && mode !== 'done') {
      let frac = 0;
      if (mode === 'armed') frac = Math.min(1, targetMs / MAX_MS);
      else if (mode === 'running' || mode === 'paused') {
        const remaining = Math.max(0, targetMs - liveElapsed());
        frac = remaining / MAX_MS;
      }
      arcEl.setAttribute('d', describeArc(frac));
    } else {
      arcEl.setAttribute('d', '');
    }

    if (mode === 'running') {
      if (direction === 'down' && liveElapsed() >= targetMs) enterDone();
      else if (direction === 'up' && liveElapsed() >= MAX_MS) enterDone();
    }
  }

  function startTicking () {
    stopTicking();
    tickHandle = setInterval(render, 200);
  }
  function stopTicking () {
    if (tickHandle) { clearInterval(tickHandle); tickHandle = null; }
  }

  function enterDone () {
    if (direction === 'down') elapsedMs = targetMs;
    else                      elapsedMs = MAX_MS;
    startedAt = 0;
    mode = 'done';
    stopTicking();
    saveState();
    render();
  }

  // ── interactions ─────────────────────────────────────────

  function tapInterior () {
    if (mode === 'done') {                    // tap-to-resurrect: fresh count-up
      direction = 'up';
      targetMs = 0;
      elapsedMs = 0;
      startedAt = Date.now();
      mode = 'running';
      startTicking();
      saveState();
      render();
      return;
    }
    if (mode === 'idle') {                    // no countdown set → count up
      direction = 'up';
      elapsedMs = 0;
      startedAt = Date.now();
      mode = 'running';
      startTicking();
      saveState();
      render();
      return;
    }
    if (mode === 'armed') {                   // begin countdown
      elapsedMs = 0;
      startedAt = Date.now();
      mode = 'running';
      startTicking();
      saveState();
      render();
      return;
    }
    if (mode === 'running') {                 // pause
      elapsedMs = liveElapsed();
      startedAt = 0;
      mode = 'paused';
      stopTicking();
      saveState();
      render();
      return;
    }
    if (mode === 'paused') {                  // resume
      startedAt = Date.now();
      mode = 'running';
      startTicking();
      saveState();
      render();
    }
  }

  function armFromAngle (angle) {
    let frac = angle / (Math.PI * 2);
    if (frac < 0) frac += 1;
    let minutes = Math.round(frac * 60);
    if (minutes === 0) minutes = 60;
    if (minutes > 60) minutes = 60;
    direction = 'down';
    targetMs = minutes * 60 * 1000;
    elapsedMs = 0;
    startedAt = 0;
    mode = 'armed';
    saveState();
    render();
  }

  function resetTimer () {
    mode = 'idle';
    direction = null;
    targetMs = 0;
    elapsedMs = 0;
    startedAt = 0;
    stopTicking();
    saveState();
    render();
  }

  // ── long-press copy ──────────────────────────────────────

  let pressTimer = null;
  let longPressed = false;
  let pressOrigin = null;

  function writeClipboard (text) {
    // try modern API first; fall back to the legacy textarea trick,
    // which still works when the gesture context is lost (timeout-fired).
    const fallback = () => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
      return ok;
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(fallback);
    } else {
      fallback();
    }
  }

  function copyTime () {
    let prefix = '';
    if (direction === 'down') prefix = '-';
    else if (direction === 'up') prefix = '+';
    const txt = prefix + fmt(displayMs());
    writeClipboard(txt);
    copyShown = { text: txt, until: Date.now() + COPY_HOLD_MS };
    numeralsEl.classList.remove('copied');
    void numeralsEl.offsetWidth;
    numeralsEl.classList.add('copied');
    render();
    setTimeout(() => {
      copyShown = null;
      numeralsEl.classList.remove('copied');
      render();
    }, COPY_HOLD_MS);
  }

  clockEl.addEventListener('pointerdown', (e) => {
    longPressed = false;
    pressOrigin = { x: e.clientX, y: e.clientY };
    pressTimer = setTimeout(() => {
      longPressed = true;
      copyTime();
    }, LONG_PRESS_MS);
  });
  function cancelPress () {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  }
  clockEl.addEventListener('pointerup',     cancelPress);
  clockEl.addEventListener('pointercancel', cancelPress);
  clockEl.addEventListener('pointerleave',  cancelPress);
  clockEl.addEventListener('pointermove', (e) => {
    if (!pressOrigin || !pressTimer) return;
    if (Math.hypot(e.clientX - pressOrigin.x, e.clientY - pressOrigin.y) > 8) cancelPress();
  });

  // ── tap routing ──────────────────────────────────────────

  clockEl.addEventListener('click', (e) => {
    if (longPressed) { longPressed = false; return; }
    const rect = clockEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.hypot(dx, dy);
    const half = rect.width / 2;
    const rimInner = half * 0.66;

    if ((mode === 'idle' || mode === 'armed') && dist > rimInner && dist <= half + 12) {
      armFromAngle(Math.atan2(dx, -dy));
      return;
    }
    tapInterior();
  });

  brandEl.addEventListener('click', resetTimer);

  // ── tasks (live, no save button) ─────────────────────────

  function currentTasks () {
    return taEl.value.split('\n').map(s => s.trim()).filter(Boolean);
  }

  function renderLabel (animate = false) {
    const tasks = currentTasks();
    if (!tasks.length) {
      labelEl.classList.remove('visible', 'flip');
      labelEl.textContent = '';
      return;
    }
    if (taskIndex >= tasks.length) taskIndex = 0;
    labelEl.textContent = tasks[taskIndex];
    labelEl.classList.add('visible');
    if (animate) {
      labelEl.classList.remove('flip');
      void labelEl.offsetWidth;
      labelEl.classList.add('flip');
    }
  }

  function cycleTask () {
    const tasks = currentTasks();
    if (!tasks.length) return;
    taskIndex = (taskIndex + 1) % tasks.length;
    renderLabel(true);
  }

  labelEl.addEventListener('click', cycleTask);

  taEl.addEventListener('input', () => {
    try { localStorage.setItem(TASKS_KEY, taEl.value); } catch {}
    renderLabel(false);
  });

  // ── sheet toggling ───────────────────────────────────────

  function openSheet () {
    sheetEl.classList.add('open');
    fabEl.classList.add('hidden');
    setTimeout(() => {
      taEl.focus();
      const end = taEl.value.length;
      try { taEl.setSelectionRange(end, end); } catch {}
    }, 30);
  }
  function closeSheet () {
    sheetEl.classList.remove('open');
    fabEl.classList.remove('hidden');
  }
  function toggleSheet () {
    if (sheetEl.classList.contains('open')) closeSheet();
    else openSheet();
  }

  fabEl.addEventListener('click', toggleSheet);
  sheetEl.addEventListener('click', (e) => {
    if (e.target === sheetEl) closeSheet();
  });

  document.addEventListener('keydown', (e) => {
    if (sheetEl.classList.contains('open')) {
      if (e.key === 'Escape') { e.preventDefault(); closeSheet(); }
      return;
    }
    if (e.key === ' ' && document.activeElement !== taEl && document.activeElement !== labelEl) {
      e.preventDefault();
      tapInterior();
    }
  });

  // ── persistence ──────────────────────────────────────────

  function saveState () {
    try {
      localStorage.setItem(STATE_KEY, JSON.stringify({
        mode, direction, targetMs, elapsedMs, startedAt
      }));
    } catch {}
  }

  function loadState () {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return false;
      const s = JSON.parse(raw);
      if (!s || typeof s.mode !== 'string') return false;
      mode = s.mode;
      direction = s.direction || null;
      targetMs = Number(s.targetMs) || 0;
      elapsedMs = Number(s.elapsedMs) || 0;
      startedAt = Number(s.startedAt) || 0;
      // honest reconciliation with wall-clock time
      if (mode === 'running' && startedAt > 0) {
        const live = elapsedMs + (Date.now() - startedAt);
        if (direction === 'down' && live >= targetMs) {
          elapsedMs = targetMs;
          startedAt = 0;
          mode = 'done';
        } else if (direction === 'up' && live >= MAX_MS) {
          elapsedMs = MAX_MS;
          startedAt = 0;
          mode = 'done';
        }
      }
      return true;
    } catch { return false; }
  }

  // ── boot ─────────────────────────────────────────────────

  function applyUrlParams () {
    const url = new URL(location.href);
    let touched = false;

    const t = url.searchParams.get('t');
    if (t != null) {
      const minutes = Math.max(1, Math.min(60, parseInt(t, 10) || 0));
      if (minutes > 0) {
        direction = 'down';
        targetMs = minutes * 60 * 1000;
        elapsedMs = 0;
        startedAt = Date.now();
        mode = 'running';
        touched = true;
      }
    }

    const tasksParam = url.searchParams.get('tasks');
    if (tasksParam) {
      const decoded = decodeURIComponent(tasksParam).replace(/\|/g, '\n');
      taEl.value = decoded;
      try { localStorage.setItem(TASKS_KEY, decoded); } catch {}
      touched = true;
    }

    if (touched) {
      // keep the URL clean so a manual reload uses persisted state, not the param again
      history.replaceState(null, '', location.pathname);
    }
    return touched;
  }

  function init () {
    try {
      const savedTasks = localStorage.getItem(TASKS_KEY);
      if (savedTasks !== null) taEl.value = savedTasks;
    } catch {}

    const hadUrlTimer = (() => {
      const url = new URL(location.href);
      return url.searchParams.has('t');
    })();

    if (!hadUrlTimer) loadState();
    applyUrlParams();

    try {
      const incoming = sessionStorage.getItem('big-incoming');
      if (incoming) {
        sessionStorage.removeItem('big-incoming');
        taEl.value = incoming;
        try { localStorage.setItem(TASKS_KEY, incoming); } catch {}
      }
    } catch {}

    renderLabel(false);
    if (mode === 'running') startTicking();
    render();
    saveState();
  }

  init();
</script>
</body>
</html>
