<!-- hn-plus.html  – v9.6 -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Hacker News Plus – v9.6</title>
  <meta name="theme-color" content="#f2f2f5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <script src="../lib/pwa.js" defer></script>
  <style>
  :root{
    --bg:#f2f2f5; --surface:#ffffff; --surface-2:#f4f4f7;
    --text:#16161a; --muted:#6b6b72; --faint:#9a9aa2;
    --border:rgba(0,0,0,.08); --border-strong:rgba(0,0,0,.14);
    --orange:#ff6600; --orange-soft:rgba(255,102,0,.12);
    --danger:#e5484d;
    --radius:14px; --radius-sm:10px;
    --shadow:0 1px 2px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
    --shadow-lg:0 14px 40px rgba(0,0,0,.18);
    --anim:.18s cubic-bezier(.25,.8,.5,1);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){ :root:not([data-theme="light"]){
    --bg:#000000; --surface:#161618; --surface-2:#1f1f23;
    --text:#f2f2f5; --muted:#9a9aa2; --faint:#6c6c74;
    --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.16);
    --orange:#ff7a2f; --orange-soft:rgba(255,122,47,.16);
    --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-lg:0 14px 40px rgba(0,0,0,.6);
  }}
  :root[data-theme="dark"]{
    --bg:#000000; --surface:#161618; --surface-2:#1f1f23;
    --text:#f2f2f5; --muted:#9a9aa2; --faint:#6c6c74;
    --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.16);
    --orange:#ff7a2f; --orange-soft:rgba(255,122,47,.16);
    --shadow:0 1px 2px rgba(0,0,0,.4); --shadow-lg:0 14px 40px rgba(0,0,0,.6);
  }

  *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;line-height:1.5;
    -webkit-font-smoothing:antialiased;min-height:100dvh}
  a{color:inherit}
  button{font-family:inherit}

  /* ---------- header ---------- */
  .app-header{position:sticky;top:0;z-index:100;
    background:color-mix(in srgb,var(--bg) 82%,transparent);
    -webkit-backdrop-filter:saturate(1.6) blur(14px);backdrop-filter:saturate(1.6) blur(14px);
    border-bottom:1px solid var(--border);
    padding:max(10px,env(safe-area-inset-top)) 14px 10px;
    display:flex;align-items:center;gap:11px}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--orange);color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:17px;flex:none}
  .wordmark{display:flex;flex-direction:column;line-height:1.08;min-width:0}
  .wordmark .t{font-weight:700;font-size:16px;letter-spacing:-.01em}
  .wordmark .v{font-size:11px;color:var(--muted)}
  .spacer{flex:1}
  .tbtn{width:40px;height:40px;border:1px solid var(--border);border-radius:12px;
    background:var(--surface);color:var(--text);font-size:19px;line-height:1;
    display:grid;place-items:center;cursor:pointer;transition:transform var(--anim),background var(--anim)}
  .tbtn:active{transform:scale(.9);background:var(--surface-2)}
  .tbtn:disabled{opacity:.5}
  #filter,#showAll{display:none}

  /* ---------- list & row ---------- */
  ul#stories{list-style:none;margin:0;padding:8px 10px calc(env(safe-area-inset-bottom) + 96px)}
  li.story{background:var(--surface);border:1px solid var(--border);margin:8px 0;padding:12px;
    border-radius:var(--radius);display:flex;align-items:flex-start;gap:10px;position:relative;
    overflow:hidden;touch-action:pan-y;box-shadow:var(--shadow);transition:transform var(--anim),opacity var(--anim)}
  .rank{font-variant-numeric:tabular-nums;color:var(--faint);font-size:13px;font-weight:600;
    min-width:16px;text-align:right;padding-top:2px;flex:none}
  .checkbox{display:none;padding-top:1px;flex:none}
  .selecting .checkbox{display:block}
  .checkbox input{width:20px;height:20px;accent-color:var(--orange)}
  .body{flex:1;min-width:0}
  a.title{display:block;font-size:16px;font-weight:600;line-height:1.34;color:var(--text);
    text-decoration:none;letter-spacing:-.01em}
  a.title:active{opacity:.55}
  .meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px 12px;margin-top:6px;
    font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .meta .domain{color:var(--faint);max-width:56vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta .score{color:var(--orange);font-weight:700}
  .meta .comment{color:var(--muted);text-decoration:none}
  .meta .comment:active{opacity:.6}
  .drag-handle{color:var(--faint);font-size:17px;cursor:grab;padding:2px;align-self:center;
    touch-action:none;letter-spacing:-3px}
  .menu-btn{color:var(--muted);font-size:20px;cursor:pointer;padding:2px 4px;align-self:center;flex:none}

  .swipe-delete{position:absolute;top:0;right:0;height:100%;display:flex;align-items:center;
    padding:0 10px;transform:translateX(110%);transition:transform var(--anim)}
  .swipe-delete.open{transform:translateX(0)}
  .swipe-delete button{background:var(--danger);border:0;border-radius:10px;padding:0 16px;
    height:calc(100% - 18px);color:#fff;font-size:.92rem;font-weight:700;cursor:pointer}

  /* ---------- floating bits ---------- */
  #fab{position:fixed;bottom:calc(env(safe-area-inset-bottom)+16px);left:50%;transform:translateX(-50%);
    background:var(--orange);color:#fff;border:0;border-radius:999px;padding:.7rem 1.4rem;font-weight:700;
    font-size:15px;display:none;box-shadow:var(--shadow-lg);cursor:pointer}

  #modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;
    justify-content:center;z-index:900}
  @media(min-width:640px){#modal{align-items:center;padding:1rem}}
  #modal .card{background:var(--surface);color:var(--text);border-radius:20px 20px 0 0;max-width:640px;
    width:100%;max-height:88vh;overflow:auto;padding:18px 16px calc(env(safe-area-inset-bottom)+16px);
    position:relative;box-shadow:var(--shadow-lg)}
  @media(min-width:640px){#modal .card{border-radius:20px}}
  #modal header{font-size:1.12rem;font-weight:700;margin:0 0 12px;padding-right:2rem}
  #modal .close{position:absolute;top:12px;right:14px;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1}
  #copyBox{width:100%;background:var(--surface-2);color:var(--text);border:1px solid var(--border);
    border-radius:12px;padding:12px;font:13px/1.55 var(--font);resize:vertical}

  .chat-wrapper{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .copy-btn,.chat-btn,.listen-btn{border:0;border-radius:10px;padding:.62rem 1rem;font-size:.92rem;
    font-weight:600;cursor:pointer}
  .copy-btn{background:var(--orange);color:#fff}
  .listen-btn,.chat-btn{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}

  .toast{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:50%;
    transform:translate(-50%,-180%);background:var(--text);color:var(--bg);border-radius:999px;
    padding:.5rem 1.1rem;font-size:.86rem;font-weight:600;z-index:950;box-shadow:var(--shadow-lg);
    transition:transform var(--anim)}
  .toast.show{transform:translate(-50%,0)}

  .sheet{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:14px;
    box-shadow:var(--shadow-lg);overflow:hidden;z-index:1100}
  .sheet button{display:block;width:100%;text-align:left;padding:.8rem 1.1rem;border:0;background:transparent;
    font-size:.95rem;color:var(--text);cursor:pointer}
  .sheet button:not(:last-child){border-bottom:1px solid var(--border)}
  .sheet button:active{background:var(--surface-2)}

  .state{padding:3.2rem 1.5rem;text-align:center;color:var(--muted);line-height:1.6}
  .state code{font-size:.85rem;color:var(--faint)}
  .state button{margin-top:1.1rem;background:var(--orange);color:#fff;border:0;border-radius:10px;
    padding:.6rem 1.3rem;font-weight:600;cursor:pointer}
  .skeleton{background:var(--surface);border:1px solid var(--border);margin:8px 0;padding:14px 12px;
    border-radius:var(--radius);box-shadow:var(--shadow)}
  .skeleton .bar{height:12px;border-radius:6px;background:var(--surface-2);margin:6px 0}
  .skeleton .bar.w70{width:70%}.skeleton .bar.w40{width:40%}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  </style>
  </head><body>

  <header class="app-header">
    <div class="logo">Y</div>
    <div class="wordmark"><span class="t">Hacker News<span style="color:var(--orange)">+</span></span><span class="v">v9.6</span></div>
    <div class="spacer"></div>
    <button id="refresh" class="tbtn" aria-label="Refresh">⟳</button>
    <button id="select"  class="tbtn" aria-label="Select">☑</button>
    <button id="filter"  class="tbtn" aria-label="Filter">👁</button>
    <button id="showAll" class="tbtn" aria-label="Show all">🔄</button>
  </header>

  <ul id="stories"></ul>
  <button id="fab"></button>

  <!-- Modal -->
  <div id="modal"><div class="card">
    <span class="close">×</span>
    <header id="modal-title"></header>
    <div id="modal-body"></div>
  </div></div>

  <div id="toast" class="toast">Copied</div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script>
  /* ------------------------------------------------------------------
     Data & constants
  -------------------------------------------------------------------*/
  const API_FB  = "https://hacker-news.firebaseio.com/v0",
        API_ALG = "https://hn.algolia.com/api/v1/search?tags=front_page",
        TIMEOUT = 6000,
        MAX_STORIES = 30;

  const list=document.getElementById("stories"),fab=document.getElementById("fab");
  const btnRefresh=document.getElementById("refresh"),btnSelect=document.getElementById("select");
  const btnFilter=document.getElementById("filter"),btnShowAll=document.getElementById("showAll");
  const toast=document.getElementById("toast");

  let stories=[],selectMode=false,filterActive=false,sortable;

  /* ---------- helpers ---------- */
  const vibrate=n=>{try{navigator.vibrate(n);}catch{}};
  const showToast=t=>{toast.textContent=t;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1400);};
  function modal(t,html){
    const m=document.getElementById("modal");m.style.display="flex";
    document.getElementById("modal-title").textContent=t;
    document.getElementById("modal-body").innerHTML=html;
    m.querySelector(".close").onclick=()=>m.style.display="none";
  }
  function copyToClipboard(text){
    return navigator.clipboard.writeText(text).then(()=>showToast("Copied ✓"));
  }
  function domainOf(u){
    try{ return new URL(u).hostname.replace(/^www\./,""); }catch{ return "news.ycombinator.com"; }
  }

  /* ---------- sheet logic ---------- */
  let sheet=null,sheetTimeout=null,sheetDocHandler=null;
  function closeSheet(){
    clearTimeout(sheetTimeout);
    if(sheet){ sheet.remove(); sheet=null; }
    if(sheetDocHandler){ document.removeEventListener("click",sheetDocHandler); sheetDocHandler=null; }
  }
  function openSheet(dom,x,y){
    closeSheet();
    sheet=dom; document.body.appendChild(sheet);
    const w=200; sheet.style.width=w+"px";
    sheet.style.left=Math.min(window.innerWidth-w-8,Math.max(8,x-w/2))+"px";
    sheet.style.top=(y+10)+"px";
    sheetTimeout=setTimeout(closeSheet,4000);
    sheetDocHandler=()=>closeSheet();
    setTimeout(()=>document.addEventListener("click",sheetDocHandler,{once:true}));
  }

  /* ---------- loader ---------- */
  function fetchJSON(url,signal){return fetch(url,{signal}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();});}
  function withTimeout(promise){
    const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),TIMEOUT);
    return promise(ctrl.signal).finally(()=>clearTimeout(t));
  }
  function algoliaStories(sig){
    return fetchJSON(API_ALG,sig).then(j=>j.hits.slice(0,MAX_STORIES).map(h=>({
      id:h.objectID,title:h.title||"(no title)",
      url:h.url||`https://news.ycombinator.com/item?id=${h.objectID}`,
      score:h.points||0,comments:h.num_comments||0
    })));
  }
  async function firebaseStories(sig){
    const ids=await fetchJSON(`${API_FB}/topstories.json`,sig);
    const items=await Promise.all(ids.slice(0,MAX_STORIES).map(id=>fetchJSON(`${API_FB}/item/${id}.json`,sig)));
    return items.map(it=>({id:it.id,title:it.title,
      url:it.url||`https://news.ycombinator.com/item?id=${it.id}`,
      score:it.score||0,comments:it.descendants||0}));
  }

  function showSkeleton(){
    list.innerHTML=Array.from({length:8}).map(()=>
      `<li class="skeleton"><div class="bar w70"></div><div class="bar w40"></div></li>`).join("");
  }

  async function loadStories(){
    btnRefresh.disabled=true;btnRefresh.textContent='⏳';showSkeleton();
    try{
      stories=await Promise.any([withTimeout(algoliaStories),withTimeout(firebaseStories)]);
      render();vibrate(40);
    }catch(err){
      console.error(err);
      list.innerHTML=`
        <div class="state">
          Couldn’t load Hacker News.<br>
          <code>${err instanceof AggregateError ? err.errors[0].message : err.message}</code><br>
          <button id="retry">Retry</button>
        </div>`;
      list.querySelector("#retry").onclick=loadStories;
    }finally{
      btnRefresh.disabled=false;btnRefresh.textContent='⟳';
    }
  }

  /* ---------- render ---------- */
  function render(){
    list.innerHTML="";
    stories.forEach((s,i)=>list.appendChild(makeItem(s,i)));
    if(!sortable){
      sortable=Sortable.create(list,{handle:".drag-handle",animation:150,
        onEnd:e=>{const [m]=stories.splice(e.oldIndex,1);stories.splice(e.newIndex,0,m);
          [...list.children].forEach((li,i)=>{li.dataset.index=i;const r=li.querySelector(".rank");if(r)r.textContent=i+1;});}
      });
    }
    updateUI();
  }
  function makeItem(s,i){
    const li=document.createElement("li");li.className="story";li.dataset.index=i;
    const dom=domainOf(s.url);
    const isHN=/ycombinator\.com$/.test(dom);
    li.innerHTML=`
      <span class="rank">${i+1}</span>
      <label class="checkbox"><input type="checkbox"></label>
      <div class="body">
        <a class="title" href="${s.url}" target="_blank" rel="noopener">${s.title}</a>
        <div class="meta">
          ${isHN?"":`<span class="domain">${dom}</span>`}
          <span class="score">▲ ${s.score}</span>
          <a class="comment" href="https://news.ycombinator.com/item?id=${s.id}" target="_blank" rel="noopener">💬 ${s.comments||0}</a>
        </div>
      </div>
      <span class="drag-handle" aria-label="reorder">⣿</span>
      <span class="menu-btn" aria-label="menu">⋯</span>
      <div class="swipe-delete"><button class="remove">Delete</button></div>`;
    wire(li);return li;
  }

  /* ---------- interactions ---------- */
  function wire(li){
    const mc=new Hammer(li);mc.get("swipe").set({direction:Hammer.DIRECTION_HORIZONTAL,velocity:0.2});
    mc.on("swipeleft",()=>li.querySelector(".swipe-delete").classList.add("open"));
    mc.on("swiperight",ev=>{
      li.querySelector(".swipe-delete").classList.remove("open");
      if(!selectMode){btnSelect.click();}
      const cb=li.querySelector("input");cb.checked=true;updateUI();vibrate(15);
    });

    li.querySelector(".remove").onclick=()=>{
      stories.splice(li.dataset.index,1);render();vibrate(25);
    };
    li.querySelector("input").addEventListener("change",updateUI);

    li.querySelector(".menu-btn").onclick=e=>{
      const i=li.dataset.index;
      const node=document.createElement("div");node.className="sheet";
      node.innerHTML=`<button id="msum">✨ Summarize</button>
        <button id="mhide">Focus this one</button>
        <button id="mcomments">Open comments</button>
        <button id="mremove">Remove</button>`;
      openSheet(node,e.clientX,e.clientY);

      node.querySelector("#msum").onclick=()=>{closeSheet();summarize([stories[i]]);};
      node.querySelector("#mhide").onclick=()=>{closeSheet();hideOthers([li]);};
      node.querySelector("#mcomments").onclick=()=>{window.open('https://news.ycombinator.com/item?id='+stories[i].id,'_blank');closeSheet();};
      node.querySelector("#mremove").onclick=()=>{li.querySelector(".remove").click();closeSheet();};

      e.stopPropagation();
    };
  }

  /* ---------- select & filter ---------- */
  btnSelect.onclick=()=>{
    selectMode=!selectMode;
    list.classList.toggle("selecting",selectMode);
    if(!selectMode) list.querySelectorAll("input").forEach(cb=>cb.checked=false);
    updateUI();vibrate(18);
  };
  function selectedLis(){return [...list.children].filter(li=>li.querySelector("input")&&li.querySelector("input").checked);}
  btnFilter.onclick=()=>hideOthers(selectedLis());
  btnShowAll.onclick=()=>{[...list.children].forEach(li=>li.style.display="flex");filterActive=false;updateUI();}
  function hideOthers(keep){
    [...list.children].forEach(li=>li.style.display="none");
    keep.forEach(li=>li.style.display="flex");
    filterActive=true;selectMode=false;list.classList.remove("selecting");
    updateUI();
  }
  function updateUI(){
    const cnt=selectedLis().length;
    fab.style.display=cnt&&selectMode?"block":"none";
    fab.textContent=cnt?`Summarize ${cnt} ✨`:"";
    fab.onclick=()=>summarize(selectedLis().map(li=>stories[li.dataset.index]));
    btnFilter.style.display=cnt&&!filterActive?"grid":"none";
    btnShowAll.style.display=filterActive?"grid":"none";
  }

  /* ---------- summary dialog ---------- */
  function buildPrompt(a){
    const hn=`https://news.ycombinator.com/item?id=${a.id}`;
    return `**${a.title}**
Article: ${a.url}
HN discussion: ${hn}

1) SUMMARY
• 5 concise bullet points summarizing the article.
• One analogy or concrete scenario that makes the core idea click.
• One sentence on why this is interesting or significant.

2) THE CHATTER
Read the Hacker News comments at the discussion link and add helpful perspective:
• The general reception/sentiment in a sentence or two — convinced, skeptical, or split?
• 3–6 of the most interesting or expert takes worth knowing.
• Any sharp disagreement, correction, or first-hand experience worth reading.
• The single thread most worth reading myself.`;
  }
  function summarize(arr){
    const txt=arr.map(buildPrompt).join("\n\n———\n\n");
    modal("Copy these prompts",
      `<textarea id="copyBox" readonly rows="16">${txt}</textarea>
       <div class="chat-wrapper">
         <button class="copy-btn"   id="btnCopy"  >Copy 📋</button>
         <button class="listen-btn" id="btnListen">🔊 Listen</button>
         <button class="chat-btn"   id="btnGPT"   >ChatGPT ↗</button>
         <button class="chat-btn"   id="btnClaude">Claude ↗</button>
         <button class="chat-btn"   id="btnGem"   >Gemini ↗</button>
       </div>`);

    document.getElementById("btnCopy").onclick   = ()=>copyToClipboard(txt);
    document.getElementById("btnListen").onclick = ()=>{ try{ speechSynthesis.cancel(); }catch{} speechSynthesis.speak(new SpeechSynthesisUtterance(txt)); };
    const openChat=url=>copyToClipboard(txt).then(()=>window.open(url,"_blank"));
    document.getElementById("btnGPT"   ).onclick = ()=>openChat("https://chat.openai.com/");
    document.getElementById("btnClaude").onclick = ()=>openChat("https://claude.ai/chat");
    document.getElementById("btnGem"   ).onclick = ()=>openChat("https://gemini.google.com/app");
  }

  /* ---------- boot ---------- */
  btnRefresh.onclick=loadStories;
  loadStories();
  </script>
  </body></html>
