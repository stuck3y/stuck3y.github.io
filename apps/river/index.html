<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>river</title>
<meta name="theme-color" content="#f5efe6" />
<link rel="manifest" href="./manifest.webmanifest" />
<script src="../lib/pwa.js" defer></script>
<script src="../lib/sys.js" defer></script>
<script>addEventListener('DOMContentLoaded', function () { if (window.sys) sys.theme.init(); });</script>
<style>
  :root {
    --bg: #f5efe6;
    --fg: #2a2520;
    --muted: #8a8275;
    --accent: #4a4338;
    --rule: rgba(74, 67, 56, 0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1a1715;
      --fg: #d8cfc2;
      --muted: #6b6357;
      --accent: #b8ad9c;
      --rule: rgba(184, 173, 156, 0.18);
    }
  }
  :root[data-theme="dark"] {
    --bg: #1a1715;
    --fg: #d8cfc2;
    --muted: #6b6357;
    --accent: #b8ad9c;
    --rule: rgba(184, 173, 156, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Iowan Old Style", "Palatino", "Charter", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  main {
    width: 100%;
    max-width: 36rem;
    margin: 0 auto;
    padding: clamp(2.5rem, 8vh, 4.5rem) 1.25rem 4rem;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .nav {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: lowercase;
  }
  .nav a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .nav a:hover { color: var(--accent); }

  ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li { border-top: 1px solid var(--rule); }
  li:last-child { border-bottom: 1px solid var(--rule); }

  .row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 0;
  }
  .row .text {
    flex: 1;
    min-width: 0;
  }
  .title-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    color: var(--fg);
    font-family: inherit;
    font-size: 1.1rem;
    line-height: 1.4;
    text-align: left;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.2s ease;
  }
  .title-btn:hover { color: var(--accent); }
  .meta {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .del {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.5rem 0.5rem;
    opacity: 0.35;
    transition: opacity 0.2s ease, color 0.2s ease;
  }
  .del:hover { opacity: 1; color: var(--accent); }

  .empty {
    padding: 3rem 0;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    line-height: 1.6;
  }
  .empty a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: var(--rule);
    text-underline-offset: 0.25em;
  }
  .empty a:hover { color: var(--accent); }

  .footnote {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    text-transform: lowercase;
  }

  /* ── clocked: sessions streamed in from other apps ────────── */
  .section { margin-bottom: 2.5rem; }
  .section-h {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: lowercase;
    color: var(--muted);
    margin: 0 0 0.85rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
  }
  .section-h .total { color: var(--fg); font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
  .day-group { margin-bottom: 1.25rem; }
  .day-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.5rem 0;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--rule);
  }
  .day-head .date { color: var(--fg); }
  .day-head .day-meta { font-variant-numeric: tabular-nums; }
  .ses-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--rule);
  }
  .ses-time {
    flex-shrink: 0;
    font-size: 0.8rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    min-width: 4.25rem;
  }
  .ses-meta {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.4rem;
    font-size: 0.95rem;
  }
  .ses-app {
    color: var(--fg);
    letter-spacing: 0.02em;
  }
  .ses-label {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    padding: 0.1rem 0.5rem;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .ses-label:hover, .ses-label.active {
    color: var(--accent);
    border-color: var(--accent);
  }
  .ses-label.untagged {
    color: var(--muted);
    border-style: dashed;
    cursor: default;
    opacity: 0.7;
  }
  .ses-dur {
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    font-size: 0.95rem;
    color: var(--fg);
    letter-spacing: 0.02em;
  }
  .filter-bar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.5rem;
    padding: 0.6rem 0.85rem;
    margin-bottom: 1rem;
    background: var(--rule);
    border-radius: 6px;
    font-size: 0.85rem;
  }
  .filter-bar .clear {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }
  .ses-empty {
    color: var(--muted);
    font-style: italic;
    font-size: 0.9rem;
    padding: 0.75rem 0;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>river</h1>
    <nav class="nav"><a href="../zen/">zen reader &rsaquo;</a></nav>
  </header>
  <div id="content"></div>
  <p class="footnote">reads drift after 30 days · sessions after 90.</p>
</main>
<script>
  const KEY = "river-reads";
  const TTL_MS = 30 * 24 * 60 * 60 * 1000;
  const SES_KEY = "river:sessions:v1";
  const SES_TTL_MS = 90 * 24 * 60 * 60 * 1000;

  // active filter for the clocked section — null or a label string
  let activeLabel = null;

  function loadReads() {
    try {
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : null;
      return data && Array.isArray(data.reads) ? data.reads : [];
    } catch { return []; }
  }

  function saveReads(reads) {
    try { localStorage.setItem(KEY, JSON.stringify({ reads })); } catch {}
  }

  function prune(reads) {
    const cutoff = Date.now() - TTL_MS;
    return reads.filter(r => (r.addedAt || 0) >= cutoff);
  }

  function relTime(ts) {
    const diff = Date.now() - ts;
    if (diff < 60_000) return "just now";
    const m = Math.floor(diff / 60_000);
    if (m < 60) return m + "m ago";
    const h = Math.floor(m / 3_600_000);
    if (h < 24) return h + "h ago";
    const d = Math.floor(h / 24);
    if (d === 1) return "yesterday";
    return d + "d ago";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  // ── sessions (the "clocked" stream from ketchapp / big / future apps) ──

  function loadSessions() {
    try {
      const raw = localStorage.getItem(SES_KEY);
      const data = raw ? JSON.parse(raw) : null;
      return Array.isArray(data) ? data : [];
    } catch { return []; }
  }
  function saveSessions(arr) {
    try { localStorage.setItem(SES_KEY, JSON.stringify(arr)); } catch {}
  }
  function pruneSessions(arr) {
    const cutoff = Date.now() - SES_TTL_MS;
    return arr.filter(s => (s.endedAt || s.startedAt || 0) >= cutoff);
  }
  function removeSession(id) {
    saveSessions(loadSessions().filter(s => s.id !== id));
    render();
  }

  function formatDur(ms) {
    const total = Math.max(0, Math.round(ms / 1000));
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h > 0) return m ? `${h}h ${m}m` : `${h}h`;
    if (m > 0) return s && m < 5 ? `${m}m ${s}s` : `${m}m`;
    return `${s}s`;
  }
  function formatClock(ts) {
    try {
      return new Date(ts).toLocaleTimeString(undefined, {
        hour: "numeric", minute: "2-digit"
      }).toLowerCase().replace(/\s/g, "");
    } catch { return ""; }
  }
  function dayKey(ts) {
    const d = new Date(ts);
    return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
  }
  function formatDayHead(ts) {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
    if (dayKey(ts) === dayKey(today.getTime())) return "today";
    if (dayKey(ts) === dayKey(yesterday.getTime())) return "yesterday";
    return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }
  function groupByDay(sessions) {
    const groups = new Map();
    for (const s of sessions) {
      const k = dayKey(s.endedAt || s.startedAt || 0);
      if (!groups.has(k)) groups.set(k, []);
      groups.get(k).push(s);
    }
    // ordered newest day first; sessions newest first inside each day
    return Array.from(groups.entries())
      .map(([k, items]) => {
        items.sort((a, b) => (b.endedAt || b.startedAt) - (a.endedAt || a.startedAt));
        const repTs = items[0].endedAt || items[0].startedAt;
        const totalMs = items.reduce((sum, x) => sum + (x.durationMs || 0), 0);
        return { key: k, repTs, items, totalMs };
      })
      .sort((a, b) => b.repTs - a.repTs);
  }

  function renderClocked() {
    let sessions = pruneSessions(loadSessions());
    saveSessions(sessions);
    if (!sessions.length) return ""; // section omitted entirely when empty

    const filtered = activeLabel
      ? sessions.filter(s => s.label === activeLabel)
      : sessions;

    const grandTotal = filtered.reduce((sum, s) => sum + (s.durationMs || 0), 0);
    const groups = groupByDay(filtered);

    const filterBar = activeLabel
      ? `<div class="filter-bar">
           <span>filtering · <strong>${escapeHtml(activeLabel)}</strong> · ${escapeHtml(formatDur(grandTotal))} across ${filtered.length} ${filtered.length === 1 ? "session" : "sessions"}</span>
           <button class="clear" data-clear-filter type="button">clear</button>
         </div>`
      : "";

    const totalLabel = activeLabel
      ? "" // already shown in the filter bar
      : `<span class="total">${escapeHtml(formatDur(grandTotal))} · ${sessions.length}</span>`;

    const body = groups.length
      ? groups.map(g => {
          const rows = g.items.map(s => {
            const labelChip = s.label
              ? `<button class="ses-label${s.label === activeLabel ? " active" : ""}" data-filter-label="${escapeHtml(s.label)}" type="button" title="filter by label">${escapeHtml(s.label)}</button>`
              : `<span class="ses-label untagged">untagged</span>`;
            return `<div class="ses-row">
              <span class="ses-time">${escapeHtml(formatClock(s.startedAt))}</span>
              <span class="ses-meta">
                <span class="ses-app">${escapeHtml(s.app)}</span>
                ${labelChip}
              </span>
              <span class="ses-dur">${escapeHtml(formatDur(s.durationMs))}</span>
              <button class="del" data-del-ses="${escapeHtml(s.id)}" type="button" aria-label="remove" title="remove">&times;</button>
            </div>`;
          }).join("");
          return `<div class="day-group">
            <div class="day-head">
              <span class="date">${escapeHtml(formatDayHead(g.repTs))}</span>
              <span class="day-meta">${escapeHtml(formatDur(g.totalMs))} · ${g.items.length}</span>
            </div>
            ${rows}
          </div>`;
        }).join("")
      : `<p class="ses-empty">no sessions match this filter.</p>`;

    return `<section class="section">
      <div class="section-h"><span>clocked</span>${totalLabel}</div>
      ${filterBar}
      ${body}
    </section>`;
  }

  function renderReads() {
    const reads = prune(loadReads());
    saveReads(reads);
    if (!reads.length) return "";
    reads.sort((a, b) =>
      (b.lastReadAt || b.addedAt || 0) - (a.lastReadAt || a.addedAt || 0)
    );
    const items = reads.map(r => {
      const total = r.total || 0;
      const i = (r.i || 0);
      const progress = total
        ? (i + 1 >= total ? "finished" : `${i + 1} / ${total}`)
        : "";
      const when = relTime(r.lastReadAt || r.addedAt || Date.now());
      const meta = progress ? `${when} · ${progress}` : when;
      const title = r.title || "untitled";
      return `<li>
        <div class="row">
          <div class="text">
            <button class="title-btn" data-open="${escapeHtml(r.id)}" type="button" title="open in zen reader">${escapeHtml(title)}</button>
            <span class="meta">${escapeHtml(meta)}</span>
          </div>
          <button class="del" data-del="${escapeHtml(r.id)}" type="button" aria-label="remove" title="remove">&times;</button>
        </div>
      </li>`;
    }).join("");
    return `<section class="section">
      <div class="section-h"><span>reads</span></div>
      <ul>${items}</ul>
    </section>`;
  }

  function openRead(read) {
    try {
      sessionStorage.setItem("zen-reader-incoming", read.text);
      sessionStorage.setItem("zen-reader-river-id", read.id);
    } catch {}
    window.location.href = "../zen/";
  }

  function removeRead(id) {
    const reads = loadReads().filter(r => r.id !== id);
    saveReads(reads);
    render();
  }

  function render() {
    const content = document.getElementById("content");
    const clockedHtml = renderClocked();
    const readsHtml = renderReads();

    if (!clockedHtml && !readsHtml) {
      content.innerHTML = `<p class="empty">your river is empty.<br><a href="../zen/">paste something into zen reader</a> and it will drift in here. or run a timer in <a href="../big/">big</a> or <a href="../ketchapp/">ketchapp</a> — completed sessions stream here too.</p>`;
      return;
    }

    content.innerHTML = clockedHtml + readsHtml;

    // reads
    content.querySelectorAll("[data-open]").forEach(b => {
      b.addEventListener("click", () => {
        const r = loadReads().find(x => x.id === b.dataset.open);
        if (r) openRead(r);
      });
    });
    content.querySelectorAll("[data-del]").forEach(b => {
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        removeRead(b.dataset.del);
      });
    });

    // sessions
    content.querySelectorAll("[data-del-ses]").forEach(b => {
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        removeSession(b.dataset.delSes);
      });
    });
    content.querySelectorAll("[data-filter-label]").forEach(b => {
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        const lbl = b.dataset.filterLabel;
        activeLabel = (activeLabel === lbl) ? null : lbl;
        render();
      });
    });
    const clearBtn = content.querySelector("[data-clear-filter]");
    if (clearBtn) clearBtn.addEventListener("click", () => {
      activeLabel = null;
      render();
    });
  }

  render();

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) render();
  });
</script>
</body>
</html>
