<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>river</title>
<meta name="theme-color" content="#f5efe6" />
<link rel="manifest" href="./manifest.webmanifest" />
<script src="../lib/pwa.js" defer></script>
<style>
  :root {
    --bg: #f5efe6;
    --fg: #2a2520;
    --muted: #8a8275;
    --accent: #4a4338;
    --rule: rgba(74, 67, 56, 0.18);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1715;
      --fg: #d8cfc2;
      --muted: #6b6357;
      --accent: #b8ad9c;
      --rule: rgba(184, 173, 156, 0.18);
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Iowan Old Style", "Palatino", "Charter", Georgia, serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  main {
    width: 100%;
    max-width: 36rem;
    margin: 0 auto;
    padding: clamp(2.5rem, 8vh, 4.5rem) 1.25rem 4rem;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .nav {
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: lowercase;
  }
  .nav a {
    color: inherit;
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .nav a:hover { color: var(--accent); }

  ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  li { border-top: 1px solid var(--rule); }
  li:last-child { border-bottom: 1px solid var(--rule); }

  .row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 0;
  }
  .row .text {
    flex: 1;
    min-width: 0;
  }
  .title-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    padding: 0;
    margin: 0;
    color: var(--fg);
    font-family: inherit;
    font-size: 1.1rem;
    line-height: 1.4;
    text-align: left;
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.2s ease;
  }
  .title-btn:hover { color: var(--accent); }
  .meta {
    display: block;
    margin-top: 0.25rem;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .del {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: inherit;
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.5rem 0.5rem;
    opacity: 0.35;
    transition: opacity 0.2s ease, color 0.2s ease;
  }
  .del:hover { opacity: 1; color: var(--accent); }

  .empty {
    padding: 3rem 0;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    line-height: 1.6;
  }
  .empty a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: var(--rule);
    text-underline-offset: 0.25em;
  }
  .empty a:hover { color: var(--accent); }

  .footnote {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    text-transform: lowercase;
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>river</h1>
    <nav class="nav"><a href="../zen/">zen reader &rsaquo;</a></nav>
  </header>
  <div id="content"></div>
  <p class="footnote">reads drift away after 30 days.</p>
</main>
<script>
  const KEY = "river-reads";
  const TTL_MS = 30 * 24 * 60 * 60 * 1000;

  function loadReads() {
    try {
      const raw = localStorage.getItem(KEY);
      const data = raw ? JSON.parse(raw) : null;
      return data && Array.isArray(data.reads) ? data.reads : [];
    } catch { return []; }
  }

  function saveReads(reads) {
    try { localStorage.setItem(KEY, JSON.stringify({ reads })); } catch {}
  }

  function prune(reads) {
    const cutoff = Date.now() - TTL_MS;
    return reads.filter(r => (r.addedAt || 0) >= cutoff);
  }

  function relTime(ts) {
    const diff = Date.now() - ts;
    if (diff < 60_000) return "just now";
    const m = Math.floor(diff / 60_000);
    if (m < 60) return m + "m ago";
    const h = Math.floor(m / 3_600_000);
    if (h < 24) return h + "h ago";
    const d = Math.floor(h / 24);
    if (d === 1) return "yesterday";
    return d + "d ago";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function openRead(read) {
    try {
      sessionStorage.setItem("zen-reader-incoming", read.text);
      sessionStorage.setItem("zen-reader-river-id", read.id);
    } catch {}
    window.location.href = "../zen/";
  }

  function removeRead(id) {
    const reads = loadReads().filter(r => r.id !== id);
    saveReads(reads);
    render();
  }

  function render() {
    const reads = prune(loadReads());
    saveReads(reads);
    reads.sort((a, b) =>
      (b.lastReadAt || b.addedAt || 0) - (a.lastReadAt || a.addedAt || 0)
    );

    const content = document.getElementById("content");

    if (!reads.length) {
      content.innerHTML = `<p class="empty">your river is empty.<br><a href="../zen/">paste something into zen reader</a> and it will drift in here.</p>`;
      return;
    }

    const items = reads.map(r => {
      const total = r.total || 0;
      const i = (r.i || 0);
      const progress = total
        ? (i + 1 >= total ? "finished" : `${i + 1} / ${total}`)
        : "";
      const when = relTime(r.lastReadAt || r.addedAt || Date.now());
      const meta = progress ? `${when} · ${progress}` : when;
      const title = r.title || "untitled";
      return `<li>
        <div class="row">
          <div class="text">
            <button class="title-btn" data-open="${escapeHtml(r.id)}" type="button" title="open in zen reader">${escapeHtml(title)}</button>
            <span class="meta">${escapeHtml(meta)}</span>
          </div>
          <button class="del" data-del="${escapeHtml(r.id)}" type="button" aria-label="remove" title="remove">&times;</button>
        </div>
      </li>`;
    }).join("");

    content.innerHTML = `<ul>${items}</ul>`;

    content.querySelectorAll("[data-open]").forEach(b => {
      b.addEventListener("click", () => {
        const r = loadReads().find(x => x.id === b.dataset.open);
        if (r) openRead(r);
      });
    });
    content.querySelectorAll("[data-del]").forEach(b => {
      b.addEventListener("click", (e) => {
        e.stopPropagation();
        removeRead(b.dataset.del);
      });
    });
  }

  render();

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) render();
  });
</script>
</body>
</html>
