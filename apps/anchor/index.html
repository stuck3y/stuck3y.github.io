<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Anchor</title>
  <meta name="theme-color" content="#0f0c0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anchor" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../lib/pwa.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>

<!-- ============ DAY ============ -->
<section class="screen active" id="screen-day">
  <header class="topbar">
    <button id="prev-day" class="nav-btn" aria-label="Previous day">&lsaquo;</button>
    <div class="date-wrap" id="date-wrap">
      <div class="weekday" id="weekday">Today</div>
      <div class="date" id="date">&mdash;</div>
    </div>
    <button id="next-day" class="nav-btn" aria-label="Next day">&rsaquo;</button>
  </header>

  <div class="summary-bar" id="summary-bar">
    <span id="summary-text">&nbsp;</span>
    <button id="today-btn" class="today-btn" hidden>Today</button>
  </div>

  <nav class="view-seg" id="view-seg" role="tablist">
    <button class="vs-btn active" data-view="day" role="tab">Day</button>
    <button class="vs-btn" data-view="week" role="tab">Week</button>
    <button class="vs-btn" data-view="month" role="tab">Month</button>
  </nav>

  <main class="timeline-wrap" id="timeline-wrap">
    <div class="timeline" id="timeline" aria-label="Daily timeline"></div>
    <div class="empty" id="empty-state" hidden>
      <div class="empty-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="48" height="48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="32" cy="14" r="4"/>
          <line x1="32" y1="18" x2="32" y2="52"/>
          <line x1="22" y1="24" x2="42" y2="24"/>
          <path d="M 14 40 Q 14 52 32 52 Q 50 52 50 40"/>
        </svg>
      </div>
      <p class="empty-title">Plan your day.</p>
      <p class="empty-sub">Tap + to add a block, or tap an empty hour on the timeline.</p>
    </div>
  </main>

  <main class="cal-wrap" id="week-wrap" hidden></main>
  <main class="cal-wrap" id="month-wrap" hidden></main>

  <button id="fab" class="fab" aria-label="Add block">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</section>

<!-- ============ SOUL ============ -->
<section class="screen" id="screen-soul">
  <header class="screen-header">
    <h1>Soul</h1>
    <p class="screen-sub">Tend the inner life.</p>
  </header>
  <div class="scroll-area" id="soul-scroll">
    <div id="remember-card"></div>
    <div id="bible-card"></div>
    <div id="prayers-card"></div>
    <div id="blessings-card"></div>
  </div>
</section>

<!-- ============ BODY ============ -->
<section class="screen" id="screen-body">
  <header class="screen-header">
    <h1>Body</h1>
    <p class="screen-sub">Steward the temple.</p>
  </header>
  <div class="scroll-area" id="body-scroll">
    <div id="weight-card"></div>
    <div id="workout-card"></div>
    <div id="backup-card"></div>
  </div>
</section>

<!-- ============ TAB BAR ============ -->
<nav class="tab-bar" id="tab-bar">
  <button class="tab-btn active" data-tab="day">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
    </svg>
    <span>Day</span>
  </button>
  <button class="tab-btn" data-tab="soul">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 5a2 2 0 0 1 2-2h7v17H6a2 2 0 0 0-2 2z"/><path d="M20 5a2 2 0 0 0-2-2h-5v17h5a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Soul</span>
  </button>
  <button class="tab-btn" data-tab="body">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 12h4l2 6 4-14 2 8h6"/>
    </svg>
    <span>Body</span>
  </button>
</nav>

<!-- ============ BLOCK SHEET (Day) ============ -->
<div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
<div class="sheet" id="sheet" hidden role="dialog" aria-label="Edit block">
  <div class="sheet-handle" aria-hidden="true"></div>
  <h2 class="sheet-title" id="sheet-title">New block</h2>
  <form id="sheet-form" autocomplete="off">
    <label class="field">
      <span class="field-label">What is it?</span>
      <input type="text" id="f-title" name="title" maxlength="80" placeholder="e.g., Morning prayer" required />
    </label>
    <div class="field-row">
      <label class="field">
        <span class="field-label">Start</span>
        <input type="time" id="f-start" name="start" required />
      </label>
      <label class="field">
        <span class="field-label">End</span>
        <input type="time" id="f-end" name="end" required />
      </label>
    </div>
    <div class="field">
      <span class="field-label">Category</span>
      <div class="cat-grid" id="cat-grid" role="radiogroup"></div>
    </div>
    <label class="field">
      <span class="field-label">Notes (optional)</span>
      <textarea id="f-notes" name="notes" rows="2" maxlength="500" placeholder="A verse, a reminder, a why&hellip;"></textarea>
    </label>
    <div class="field" id="status-field" hidden>
      <span class="field-label">Status</span>
      <div class="seg" id="status-seg" role="radiogroup">
        <button type="button" class="seg-btn" data-status="planned">Planned</button>
        <button type="button" class="seg-btn" data-status="done">Done</button>
        <button type="button" class="seg-btn" data-status="skipped">Skipped</button>
      </div>
    </div>
    <p class="sheet-error" id="sheet-error" hidden></p>
    <div class="sheet-actions">
      <button type="button" id="delete-btn" class="btn-danger" hidden>Delete</button>
      <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
      <button type="submit" class="btn-primary">Save</button>
    </div>
  </form>
</div>

<!-- ============ GENERIC SHEET (Soul / Body) ============ -->
<div class="sheet" id="gsheet" hidden role="dialog" aria-label="Entry">
  <div class="sheet-handle" aria-hidden="true"></div>
  <h2 class="sheet-title" id="g-title">Add</h2>
  <div id="g-fields"></div>
  <p class="sheet-error" id="g-error" hidden></p>
  <div class="sheet-actions">
    <button type="button" id="g-delete" class="btn-danger" hidden>Delete</button>
    <button type="button" id="g-cancel" class="btn-secondary">Cancel</button>
    <button type="button" id="g-save" class="btn-primary">Save</button>
  </div>
</div>

</body>
</html>
