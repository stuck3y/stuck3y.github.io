<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps &middot; Jon's Data Company</title>
    <meta name="theme-color" content="#fbfbfd">
    <style>
        :root {
            --bg: #fbfbfd;
            --fg: #1d1d1f;
            --fg-muted: #6e6e73;
            --rule: #e5e5e7;
            --link: #1d1d1f;
            --link-hover: #2f6f80;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0c;
                --fg: #f5f5f7;
                --fg-muted: #86868b;
                --rule: #2a2a2c;
                --link: #f5f5f7;
                --link-hover: #6fb6c8;
            }
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: clamp(56px, 10vh, 120px) 24px 64px;
        }

        .site-nav {
            margin-bottom: 56px;
            font-size: 14px;
        }
        .site-nav a {
            color: var(--fg-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .site-nav a:hover { color: var(--link-hover); }

        h1 {
            margin: 0 0 40px;
            font-size: clamp(32px, 5vw, 40px);
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.1;
        }

        .app-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .app-list li { border-top: 1px solid var(--rule); }
        .app-list li:last-child { border-bottom: 1px solid var(--rule); }

        .app-link {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
            padding: 20px 0;
            text-decoration: none;
            color: var(--link);
            transition: color 0.2s ease;
        }
        .app-link:hover { color: var(--link-hover); }

        .app-text { flex: 1; min-width: 0; }
        .app-name {
            display: block;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }
        .app-desc {
            display: block;
            font-size: 15px;
            color: var(--fg-muted);
            line-height: 1.47;
        }
        .app-arrow {
            color: var(--fg-muted);
            font-size: 18px;
            flex-shrink: 0;
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .app-link:hover .app-arrow {
            transform: translateX(4px);
            color: var(--link-hover);
        }
        .app-empty {
            margin: 0;
            padding: 24px 0;
            color: var(--fg-muted);
            font-size: 15px;
            border-top: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
        }

        footer {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 32px 24px;
            border-top: 1px solid var(--rule);
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--fg-muted);
        }
        footer a {
            color: var(--fg-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        footer a:hover { color: var(--link-hover); }
    </style>
</head>
<body>
    <main>
        <nav class="site-nav">
            <a href="../">&larr; Jon's Data Company</a>
        </nav>

        <h1>Apps</h1>

        <ul class="app-list" id="app-list"></ul>
        <p id="app-empty" class="app-empty" hidden>Nothing featured yet.</p>
    </main>

    <footer>
        <a href="../">Home</a>
        <a href="../blog/">Blog</a>
        <a href="./manage/">Manage</a>
        <a href="mailto:contact@jonsdata.com">Contact</a>
        <a href="https://github.com/stuck3y" target="_blank" rel="noopener">GitHub</a>
    </footer>

    <script>
    (async () => {
        const list = document.getElementById("app-list");
        const empty = document.getElementById("app-empty");
        try {
            const res = await fetch("./apps.json", { cache: "no-cache" });
            if (!res.ok) throw new Error("manifest fetch failed");
            const data = await res.json();
            const featured = (data.apps || []).filter(a => a.featured);
            if (!featured.length) { empty.hidden = false; return; }
            const frag = document.createDocumentFragment();
            for (const app of featured) {
                const li = document.createElement("li");
                const a = document.createElement("a");
                a.className = "app-link";
                a.href = app.path;
                a.innerHTML = `
                    <span class="app-text">
                        <span class="app-name"></span>
                        <span class="app-desc"></span>
                    </span>
                    <span class="app-arrow" aria-hidden="true">&rsaquo;</span>
                `;
                a.querySelector(".app-name").textContent = app.name;
                a.querySelector(".app-desc").textContent = app.description || "";
                li.appendChild(a);
                frag.appendChild(li);
            }
            list.appendChild(frag);
        } catch (err) {
            empty.textContent = "Couldn't load the apps list.";
            empty.hidden = false;
        }
    })();
    </script>
</body>
</html>
