<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Apps</title>
<meta name="description" content="The launcher for Jon's apps." />
<meta name="theme-color" content="#f5f5f7" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Apps" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="stylesheet" href="./lib/tokens.css" />
<script src="./lib/sys.js" defer></script>
<script src="./lib/pwa.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
  }
  body { min-height: 100dvh; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--space-4);
    max-width: 760px;
    margin: 0 auto;
    padding: var(--space-12) var(--space-6) var(--space-6);
  }
  header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .search-hint {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    border-radius: var(--radius-full);
    padding: var(--space-1) var(--space-3);
    font-size: 13px;
    cursor: pointer;
    transition: border-color var(--fast) var(--ease);
  }
  .search-hint:hover { border-color: var(--accent); }
  .actions { display: flex; align-items: center; gap: var(--space-2); }
  kbd {
    font-family: var(--font);
    font-size: 12px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 1px 6px;
  }

  .grid {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 var(--space-6) var(--space-12);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
    gap: var(--space-6) var(--space-4);
  }
  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-2);
    background: none;
    border: 0;
    padding: 0;
    font: inherit;
    color: var(--text);
    cursor: pointer;
    text-decoration: none;
  }
  .tile .icon {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-lg);
    display: grid;
    place-items: center;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.02em;
    box-shadow: var(--shadow-md);
    transition: transform var(--fast) var(--ease);
  }
  .tile:active .icon { transform: scale(0.92); }
  .tile .icon { position: relative; }
  /* live activity: a pulsing dot when the app emits session.start on the bus */
  .tile.active .icon::after {
    content: "";
    position: absolute;
    top: -3px; right: -3px;
    width: 14px; height: 14px;
    border-radius: var(--radius-full);
    background: var(--success);
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.6);
    animation: pulse 1.8s var(--ease) infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.5); }
    70%  { box-shadow: 0 0 0 8px rgba(52, 199, 89, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .tile.active .icon::after { animation: none; }
  }
  .tile .label {
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    line-height: 1.25;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Command palette */
  .palette-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 12vh var(--space-4) var(--space-4);
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--fast) var(--ease);
    z-index: 100;
  }
  .palette-backdrop.open { opacity: 1; pointer-events: auto; }
  .palette {
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transform: translateY(-8px) scale(0.99);
    transition: transform var(--fast) var(--ease);
  }
  .palette-backdrop.open .palette { transform: none; }
  .palette input {
    width: 100%;
    border: 0;
    border-bottom: 1px solid var(--border);
    background: none;
    color: var(--text);
    font: inherit;
    font-size: 17px;
    padding: var(--space-4) var(--space-5);
    outline: none;
  }
  .palette ul { list-style: none; margin: 0; padding: var(--space-2); max-height: 50vh; overflow-y: auto; }
  .palette li {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    cursor: pointer;
  }
  .palette li[aria-selected="true"] { background: var(--accent); color: var(--accent-text); }
  .palette li .dot {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    flex: none;
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
    box-shadow: var(--shadow-sm);
  }
  .palette li .meta { min-width: 0; }
  .palette li .meta .name { font-size: 15px; font-weight: 500; }
  .palette li .meta .desc {
    font-size: 12px;
    color: var(--text-secondary);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .palette li[aria-selected="true"] .meta .desc { color: rgba(255, 255, 255, 0.8); }
  .palette .empty { padding: var(--space-5); text-align: center; color: var(--text-secondary); font-size: 14px; }
</style>
</head>
<body>
  <header>
    <h1>Apps</h1>
    <div class="actions">
      <button class="search-hint" id="theme-toggle" aria-label="Theme"></button>
      <button class="search-hint" id="open-palette" aria-label="Search apps">
        <span>Search</span><kbd id="hint-key">⌘K</kbd>
      </button>
    </div>
  </header>

  <main class="grid" id="grid" aria-label="All apps"></main>

  <div class="palette-backdrop" id="backdrop" role="dialog" aria-modal="true" aria-label="Command palette" hidden>
    <div class="palette">
      <input id="palette-input" type="text" placeholder="Search apps…" autocomplete="off" spellcheck="false" />
      <ul id="palette-list"></ul>
    </div>
  </div>

  <script>
  window.addEventListener('DOMContentLoaded', function () {
    sys.theme.init();

    // Theme toggle: cycles auto -> light -> dark, propagates to every open app.
    var LABELS = { auto: 'Auto', light: 'Light', dark: 'Dark' };
    var themeBtn = document.getElementById('theme-toggle');
    function paintTheme() { themeBtn.textContent = LABELS[sys.theme.get()]; }
    themeBtn.addEventListener('click', function () {
      var order = sys.theme.THEMES;
      var next = order[(order.indexOf(sys.theme.get()) + 1) % order.length];
      sys.theme.set(next);
      paintTheme();
    });
    sys.bus.on('theme', paintTheme); // stay in sync if another app changes it
    paintTheme();

    // Light text on dark tiles, dark text on light tiles.
    function luminance(hex) {
      var h = hex.replace('#', '');
      if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
      var r = parseInt(h.slice(0, 2), 16) / 255;
      var g = parseInt(h.slice(2, 4), 16) / 255;
      var b = parseInt(h.slice(4, 6), 16) / 255;
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }
    function ink(hex) { return luminance(hex) > 0.6 ? '#1d1d1f' : '#ffffff'; }
    function monogram(name) {
      var parts = name.split(/[^A-Za-z0-9]+/).filter(Boolean);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return (parts[0] || '?').slice(0, 2).toUpperCase();
    }

    // --- Grid ---
    var grid = document.getElementById('grid');
    sys.apps.forEach(function (app) {
      var a = document.createElement('a');
      a.className = 'tile';
      a.dataset.id = app.id;
      a.href = app.path;
      a.innerHTML =
        '<span class="icon" style="background:' + app.color + ';color:' + ink(app.color) + '">' +
          monogram(app.name) +
        '</span>' +
        '<span class="label">' + app.name + '</span>';
      grid.appendChild(a);
    });

    // --- Live activity (bus consumer) ---
    // When any app emits session.start/session.end, light up its tile.
    function setActive(id, on) {
      var tile = grid.querySelector('.tile[data-id="' + id + '"]');
      if (tile) tile.classList.toggle('active', on);
    }
    sys.bus.on('session.start', function (d) { if (d && d.app) setActive(d.app, true); });
    sys.bus.on('session.end',   function (d) { if (d && d.app) setActive(d.app, false); });

    // --- Command palette ---
    var backdrop = document.getElementById('backdrop');
    var input = document.getElementById('palette-input');
    var list = document.getElementById('palette-list');
    var results = [];
    var selected = 0;

    var isMac = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
    if (!isMac) document.getElementById('hint-key').textContent = 'Ctrl K';

    function score(app, q) {
      var hay = (app.name + ' ' + app.id + ' ' + (app.desc || '')).toLowerCase();
      return hay.indexOf(q) !== -1;
    }
    function render() {
      var q = input.value.trim().toLowerCase();
      results = q ? sys.apps.filter(function (a) { return score(a, q); }) : sys.apps.slice();
      selected = 0;
      if (!results.length) {
        list.innerHTML = '<li class="empty">No apps match “' + q + '”</li>';
        return;
      }
      list.innerHTML = results.map(function (app, i) {
        return '<li role="option" data-i="' + i + '" aria-selected="' + (i === selected) + '">' +
          '<span class="dot" style="background:' + app.color + ';color:' + ink(app.color) + '">' + monogram(app.name) + '</span>' +
          '<span class="meta"><div class="name">' + app.name + '</div>' +
          (app.desc ? '<div class="desc">' + app.desc + '</div>' : '') + '</span>' +
        '</li>';
      }).join('');
    }
    function move(d) {
      if (!results.length) return;
      selected = (selected + d + results.length) % results.length;
      Array.prototype.forEach.call(list.children, function (li) {
        var on = +li.dataset.i === selected;
        li.setAttribute('aria-selected', on);
        if (on) li.scrollIntoView({ block: 'nearest' });
      });
    }
    function open() {
      backdrop.hidden = false;
      requestAnimationFrame(function () { backdrop.classList.add('open'); });
      input.value = '';
      render();
      input.focus();
    }
    function close() {
      backdrop.classList.remove('open');
      setTimeout(function () { backdrop.hidden = true; }, 160);
    }
    function choose() {
      var app = results[selected];
      if (app) sys.launch(app.id);
    }

    document.getElementById('open-palette').addEventListener('click', open);
    input.addEventListener('input', render);
    list.addEventListener('click', function (e) {
      var li = e.target.closest('li[data-i]');
      if (li) { selected = +li.dataset.i; choose(); }
    });
    backdrop.addEventListener('click', function (e) { if (e.target === backdrop) close(); });

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        backdrop.hidden ? open() : close();
        return;
      }
      if (backdrop.hidden) return;
      if (e.key === 'Escape') { e.preventDefault(); close(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); move(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); move(-1); }
      else if (e.key === 'Enter') { e.preventDefault(); choose(); }
    });
  });
  </script>
</body>
</html>
