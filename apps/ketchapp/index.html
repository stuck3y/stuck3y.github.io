<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Ketchapp</title>
<meta name="theme-color" content="#c92a2a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.webmanifest" />
<script src="../lib/pwa.js" defer></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  :root {
    --bg: #c92a2a;
    --bg-work: #c92a2a;
    --bg-break: #2a8a3e;
  }
  body { transition: background 0.35s ease, filter 0.2s ease; }
  body.work { --bg: var(--bg-work); }
  body.break { --bg: var(--bg-break); }
  body.paused { filter: brightness(0.55); }
  body.done { filter: brightness(0.85); }
  main {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .digit {
    font-size: clamp(140px, 38vw, 320px);
    font-weight: 800;
    line-height: 0.92;
    letter-spacing: -0.045em;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }
</style>
</head>
<body class="work">
<main id="timer" aria-label="Pomodoro timer">
  <div class="digit" id="mm">25</div>
  <div class="digit" id="ss">00</div>
</main>
<script>
(() => {
  const WORK = 25 * 60;
  const BREAK = 5 * 60;
  const DOUBLE_TAP_MS = 280;

  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const themeMeta = document.querySelector('meta[name="theme-color"]');

  let mode = 'work';
  let running = true;
  let endTime = Date.now() + WORK * 1000;
  let pausedRemaining = WORK;

  function durationFor(m) { return m === 'work' ? WORK : BREAK; }

  function remaining() {
    if (running) return Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    return pausedRemaining;
  }

  function render() {
    const r = remaining();
    const m = Math.floor(r / 60);
    const s = r % 60;
    mm.textContent = m.toString().padStart(2, '0');
    ss.textContent = s.toString().padStart(2, '0');
    const cls = [mode];
    if (!running) cls.push('paused');
    if (running && r === 0) cls.push('done');
    document.body.className = cls.join(' ');
    themeMeta.content = mode === 'work' ? '#c92a2a' : '#2a8a3e';
  }

  function startMode(m) {
    mode = m;
    pausedRemaining = durationFor(m);
    endTime = Date.now() + pausedRemaining * 1000;
    running = true;
    render();
  }

  function togglePause() {
    const r = remaining();
    if (running && r === 0) {
      startMode(mode);
      return;
    }
    if (running) {
      pausedRemaining = r;
      running = false;
    } else {
      endTime = Date.now() + pausedRemaining * 1000;
      running = true;
    }
    render();
  }

  function flip() {
    startMode(mode === 'work' ? 'break' : 'work');
  }

  let lastTap = 0;
  let singleTapTimer = null;
  function onTap(ev) {
    ev.preventDefault();
    const now = Date.now();
    if (now - lastTap < DOUBLE_TAP_MS) {
      lastTap = 0;
      if (singleTapTimer) { clearTimeout(singleTapTimer); singleTapTimer = null; }
      flip();
    } else {
      lastTap = now;
      singleTapTimer = setTimeout(() => {
        singleTapTimer = null;
        togglePause();
      }, DOUBLE_TAP_MS);
    }
  }
  document.body.addEventListener('click', onTap);

  setInterval(render, 250);
  render();

  let wakeLock = null;
  async function tryWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
  }
  tryWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') tryWakeLock();
  });
})();
</script>
</body>
</html>
