<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon's Data Company</title>
    <meta name="theme-color" content="#fbfbfd">
    <style>
        :root {
            --bg: #fbfbfd;
            --fg: #1d1d1f;
            --fg-muted: #6e6e73;
            --rule: #e5e5e7;
            --link: #1d1d1f;
            --link-hover: #0066cc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --fg: #f5f5f7;
                --fg-muted: #86868b;
                --rule: #2a2a2c;
                --link: #f5f5f7;
                --link-hover: #2997ff;
            }
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: clamp(64px, 12vh, 140px) 24px 64px;
        }

        header {
            margin-bottom: 96px;
        }

        .logo {
            display: block;
            width: 96px;
            height: auto;
            margin-bottom: 40px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(36px, 5vw, 48px);
            font-weight: 600;
            letter-spacing: -0.025em;
            line-height: 1.08;
        }

        .tagline {
            margin: 0;
            color: var(--fg-muted);
            font-size: 19px;
            line-height: 1.47;
            font-weight: 400;
        }

        section {
            margin-bottom: 64px;
        }

        .eyebrow {
            display: block;
            margin: 0 0 24px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--fg-muted);
        }

        .app-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .app-list li {
            border-top: 1px solid var(--rule);
        }
        .app-list li:last-child {
            border-bottom: 1px solid var(--rule);
        }

        .app-link {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 24px;
            padding: 20px 0;
            text-decoration: none;
            color: var(--link);
            transition: color 0.2s ease, padding 0.2s ease;
        }
        .app-link:hover {
            color: var(--link-hover);
        }

        .app-text {
            flex: 1;
            min-width: 0;
        }

        .app-name {
            display: block;
            font-size: 19px;
            font-weight: 500;
            letter-spacing: -0.01em;
            margin-bottom: 4px;
        }

        .app-desc {
            display: block;
            font-size: 15px;
            color: var(--fg-muted);
            font-weight: 400;
            line-height: 1.47;
        }

        .app-arrow {
            color: var(--fg-muted);
            font-size: 18px;
            transition: transform 0.2s ease, color 0.2s ease;
            flex-shrink: 0;
        }
        .app-link:hover .app-arrow {
            transform: translateX(4px);
            color: var(--link-hover);
        }

        footer {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 32px 24px;
            border-top: 1px solid var(--rule);
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--fg-muted);
        }

        footer a {
            color: var(--fg-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        footer a:hover {
            color: var(--link-hover);
        }

        @media (max-width: 480px) {
            main { padding-top: 56px; }
            header { margin-bottom: 64px; }
            .logo { width: 80px; margin-bottom: 32px; }
            .app-link { gap: 16px; }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <img src="jdc_logo.png" alt="" class="logo">
            <h1>Jon's Data Company</h1>
            <p class="tagline">Building innovative tools and experiences.</p>
        </header>

        <section aria-labelledby="apps-label">
            <span id="apps-label" class="eyebrow">Apps</span>
            <ul class="app-list">
                <li>
                    <a href="./apps/slantboard/" class="app-link">
                        <span class="app-text">
                            <span class="app-name">Slant Board Timer</span>
                            <span class="app-desc">Short morning routine for patellar tendon and tarsal tunnel — 5, 10, or 12 minutes.</span>
                        </span>
                        <span class="app-arrow" aria-hidden="true">&rsaquo;</span>
                    </a>
                </li>
                <li>
                    <a href="./apps/foundation/" class="app-link">
                        <span class="app-text">
                            <span class="app-name">Foundation 12</span>
                            <span class="app-desc">A step-by-step timer for the original 12-minute Foundation Training sequence.</span>
                        </span>
                        <span class="app-arrow" aria-hidden="true">&rsaquo;</span>
                    </a>
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <a href="mailto:contact@jonsdata.com">Contact</a>
        <a href="https://github.com/stuck3y" target="_blank" rel="noopener">GitHub</a>
    </footer>
</body>
</html>
