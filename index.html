<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jon's Data Company</title>
    <meta name="theme-color" content="#fbfbfd">
    <style>
        :root {
            --bg: #fbfbfd;
            --fg: #1d1d1f;
            --fg-muted: #6e6e73;
            --link: #1d1d1f;
            --link-hover: #2f6f80;
            --logo-frame: #ffffff;
            --logo-shadow: rgba(0, 0, 0, 0.06);
            --bubble-1: rgba(45, 110, 130, 0.10);
            --bubble-2: rgba(45, 60, 90, 0.08);
            --bubble-3: rgba(120, 150, 170, 0.10);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0c;
                --fg: #f5f5f7;
                --fg-muted: #86868b;
                --link: #f5f5f7;
                --link-hover: #6fb6c8;
                --logo-frame: #ffffff;
                --logo-shadow: rgba(0, 0, 0, 0.5);
                --bubble-1: rgba(111, 182, 200, 0.10);
                --bubble-2: rgba(150, 170, 200, 0.06);
                --bubble-3: rgba(80, 130, 150, 0.10);
            }
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100dvh;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Floating bubbles, slow and quiet */
        .bubble {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(1px);
            will-change: transform;
        }
        .bubble.b1 {
            width: 280px; height: 280px;
            background: var(--bubble-1);
            top: -60px; left: -80px;
            animation: drift-1 28s ease-in-out infinite;
        }
        .bubble.b2 {
            width: 200px; height: 200px;
            background: var(--bubble-2);
            bottom: -50px; right: -40px;
            animation: drift-2 34s ease-in-out infinite;
        }
        .bubble.b3 {
            width: 140px; height: 140px;
            background: var(--bubble-3);
            top: 55%; left: 70%;
            animation: drift-3 40s ease-in-out infinite;
        }
        @keyframes drift-1 {
            0%, 100% { transform: translate(0, 0); }
            50%      { transform: translate(40px, 30px); }
        }
        @keyframes drift-2 {
            0%, 100% { transform: translate(0, 0); }
            50%      { transform: translate(-30px, -40px); }
        }
        @keyframes drift-3 {
            0%, 100% { transform: translate(0, 0); }
            50%      { transform: translate(-50px, 20px); }
        }
        @media (prefers-reduced-motion: reduce) {
            .bubble { animation: none; }
        }

        main {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .logo {
            display: block;
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            background: var(--logo-frame);
            padding: 8px;
            border-radius: 18px;
            box-shadow: 0 4px 24px var(--logo-shadow);
            object-fit: contain;
        }

        h1 {
            margin: 0 0 40px;
            font-size: clamp(20px, 3.6vw, 24px);
            font-weight: 400;
            letter-spacing: -0.01em;
            line-height: 1.4;
            color: var(--fg);
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(16px, 4vw, 28px);
            flex-wrap: wrap;
        }

        nav a {
            color: var(--fg-muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0;
            transition: color 0.25s ease;
        }
        nav a:hover {
            color: var(--link-hover);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 480px) {
            .logo { width: 72px; height: 72px; margin-bottom: 24px; }
            h1 { margin-bottom: 32px; }
            .bubble.b1 { width: 220px; height: 220px; }
            .bubble.b2 { width: 160px; height: 160px; }
            .bubble.b3 { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="bubble b1" aria-hidden="true"></div>
    <div class="bubble b2" aria-hidden="true"></div>
    <div class="bubble b3" aria-hidden="true"></div>

    <main>
        <img src="logo.png" alt="Jon's Data Company" class="logo">
        <h1 class="visually-hidden">Jon's Data Company</h1>
        <h1>Building great things with great people.</h1>
        <nav aria-label="Primary">
            <a href="./blog/">Blog</a>
            <a href="mailto:contact@jonsdata.com">Contact</a>
            <a href="https://github.com/stuck3y" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </main>
</body>
</html>
